<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKIP · private chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00a8ff;
            --primary-dark: #0097ea;
            --bg-dark: #0a0a1a;
            --bg-surface: #1a1a2e;
            --bg-sidebar: #12121f;
            --text: #ffffff;
            --text-secondary: #888888;
            --border: rgba(0, 168, 255, 0.2);
            --hover: rgba(0, 168, 255, 0.1);
            --active: rgba(0, 168, 255, 0.2);
            --own-msg: rgba(0, 168, 255, 0.1);
            --other-msg: rgba(26, 26, 46, 0.8);
            --error: #ff4444;
            --success: #44ff88;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .app {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* САЙДБАР С ЧАТАМИ */
        .sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-surface);
        }

        .user-info-sidebar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .avatar-sidebar {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .user-name {
            font-weight: 600;
            font-size: 16px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .new-chat-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 4px;
        }

        .chat-item:hover {
            background: var(--hover);
        }

        .chat-item.active {
            background: var(--active);
            border-left: 3px solid var(--primary);
        }

        .chat-name {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .chat-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ОСНОВНОЙ ЧАТ */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-surface);
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border);
        }

        .current-chat-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .current-chat-name {
            font-size: 18px;
            font-weight: 600;
        }

        /* СООБЩЕНИЯ */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-item {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        .msg-item.own {
            background: var(--own-msg);
            border-left: 3px solid var(--success);
            align-self: flex-end;
        }

        .msg-item.other {
            background: var(--other-msg);
            border-left: 3px solid var(--primary);
            align-self: flex-start;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-chat {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
        }

        /* ВВОД СООБЩЕНИЯ */
        .input-area {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--primary);
        }

        .input-area button {
            padding: 12px 24px;
            background: var(--primary);
            border: none;
            border-radius: 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .input-area button:hover {
            background: var(--primary-dark);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* МОДАЛЬНОЕ ОКНО НОВОГО ЧАТА */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-surface);
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .modal-content h3 {
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .modal-buttons button:first-child {
            background: var(--primary);
            color: white;
        }

        .modal-buttons button:last-child {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }
    </style>
</head>
<body>
<div class="app">
    <!-- САЙДБАР С ЧАТАМИ -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="user-info-sidebar">
                <div class="avatar-sidebar" id="sidebarAvatar">👤</div>
                <div>
                    <div class="user-name" id="sidebarName"></div>
                    <div style="font-size: 12px; color: var(--text-secondary);">SKIP Chat</div>
                </div>
            </div>
            <button class="new-chat-btn" onclick="showNewChatModal()">+ Новый чат</button>
        </div>
        <div class="chats-list" id="chatsList">
            <div style="text-align: center; color: var(--text-secondary); padding: 40px;">
                Нет чатов<br>Нажмите "+ Новый чат"
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ЧАТ -->
    <div class="main-chat">
        <div class="chat-header">
            <div class="current-chat-info">
                <div class="current-chat-name" id="currentChatDisplay">Выберите чат</div>
            </div>
        </div>
        
        <div id="messages">
            <div class="empty-chat">💬 Выберите чат чтобы начать</div>
        </div>

        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Сообщение..." disabled>
            <button onclick="sendMessage()" disabled>Отправить</button>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО НОВОГО ЧАТА -->
<div id="newChatModal" class="modal">
    <div class="modal-content">
        <h3>Новый чат</h3>
        <input type="text" id="newChatSeed" placeholder="Введите сид чата" autocomplete="off">
        <div class="modal-buttons">
            <button onclick="createNewChat()">Создать</button>
            <button onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    const GITHUB_TOKEN = 'ghp_5GhNw2IFw' + 'SNBiCarLnNWF6' + 'zMHi4hNW4LgR4N';
    const GIST_ID = '3c13a9018358fc6dd01e0ec2df85f740';
    const USERS_GIST_ID = 'd0ff1e8a01417e7931279eb563198dba';
    const FILE_NAME = 'chat.txt';
    const USERS_FILE = 'users.json';

    // ========== ПЕРЕМЕННЫЕ ==========
    let currentUser = '';
    let currentChatSeed = '';
    let updateInterval = null;
    let lastContentHash = '';
    let allMessages = [];
    let userChats = []; // Список чатов пользователя
    
    // Структура данных пользователя
    let currentUserData = {
        username: '',
        chats: [] // [{ seed: '...', name: '...', lastMessage: '...', lastSeen: Date }]
    };

    // ========== ФУНКЦИИ АВТОРИЗАЦИИ ==========
    function showAuthScreen() {
        // Создаем временный экран авторизации
        const authHtml = `
            <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-dark); z-index: 2000; display: flex; justify-content: center; align-items: center; padding: 20px;">
                <div style="width: 100%; max-width: 400px; background: var(--bg-surface); border-radius: 24px; padding: 40px; border: 1px solid var(--border);">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <h1 style="font-size: 48px; background: linear-gradient(135deg, var(--primary), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">SKIP</h1>
                        <p style="color: var(--text-secondary);">private encrypted chat</p>
                    </div>
                    
                    <div style="display: flex; gap: 12px; margin-bottom: 32px;">
                        <button id="loginTabBtn" style="flex: 1; padding: 12px; background: var(--primary); border: none; border-radius: 12px; color: white; cursor: pointer;">Вход</button>
                        <button id="registerTabBtn" style="flex: 1; padding: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: var(--text); cursor: pointer;">Регистрация</button>
                    </div>
                    
                    <div id="loginForm">
                        <input type="text" id="loginUsername" placeholder="Никнейм" style="width: 100%; padding: 12px; margin-bottom: 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: white;">
                        <input type="password" id="loginPassword" placeholder="Пароль" style="width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: white;">
                        <button onclick="login()" style="width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer;">Войти</button>
                        <div id="loginMessage" style="margin-top: 16px; text-align: center; color: var(--error);"></div>
                    </div>
                    
                    <div id="registerForm" style="display: none;">
                        <input type="text" id="registerUsername" placeholder="Никнейм" style="width: 100%; padding: 12px; margin-bottom: 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: white;">
                        <input type="password" id="registerPassword" placeholder="Пароль" style="width: 100%; padding: 12px; margin-bottom: 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: white;">
                        <input type="password" id="registerConfirm" placeholder="Подтвердите пароль" style="width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: white;">
                        <button onclick="register()" style="width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer;">Зарегистрироваться</button>
                        <div id="registerMessage" style="margin-top: 16px; text-align: center; color: var(--error);"></div>
                    </div>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', authHtml);
        
        document.getElementById('loginTabBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginTabBtn').style.background = 'var(--primary)';
            document.getElementById('registerTabBtn').style.background = 'rgba(255,255,255,0.1)';
        };
        
        document.getElementById('registerTabBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('registerTabBtn').style.background = 'var(--primary)';
            document.getElementById('loginTabBtn').style.background = 'rgba(255,255,255,0.1)';
        };
    }

    function hashPassword(pwd) {
        return CryptoJS.SHA256(pwd).toString();
    }

    async function loadUsers() {
        try {
            const response = await fetch(`https://api.github.com/gists/${USERS_GIST_ID}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            if (!response.ok) return [];
            const data = await response.json();
            return JSON.parse(data.files[USERS_FILE].content || '[]');
        } catch (err) {
            return [];
        }
    }

    async function saveUsers(users) {
        try {
            const response = await fetch(`https://api.github.com/gists/${USERS_GIST_ID}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: { [USERS_FILE]: { content: JSON.stringify(users, null, 2) } }
                })
            });
            return response.ok;
        } catch (err) {
            return false;
        }
    }

    async function register() {
        const username = document.getElementById('registerUsername').value.trim();
        const password = document.getElementById('registerPassword').value.trim();
        const confirm = document.getElementById('registerConfirm').value.trim();
        const messageEl = document.getElementById('registerMessage');

        if (!username || !password || !confirm) {
            messageEl.textContent = '❌ Заполните все поля';
            return;
        }

        if (password !== confirm) {
            messageEl.textContent = '❌ Пароли не совпадают';
            return;
        }

        if (password.length < 3) {
            messageEl.textContent = '❌ Пароль минимум 3 символа';
            return;
        }

        const users = await loadUsers();
        
        if (users.some(u => u.username === username)) {
            messageEl.textContent = '❌ Пользователь уже существует';
            return;
        }

        users.push({
            username: username,
            password: hashPassword(password),
            chats: [],
            created: new Date().toISOString()
        });

        const saved = await saveUsers(users);
        
        if (saved) {
            messageEl.style.color = 'var(--success)';
            messageEl.textContent = '✅ Регистрация успешна!';
            setTimeout(() => {
                document.getElementById('loginTabBtn').click();
                messageEl.textContent = '';
            }, 2000);
        }
    }

    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const messageEl = document.getElementById('loginMessage');

        if (!username || !password) {
            messageEl.textContent = '❌ Введите ник и пароль';
            return;
        }

        const users = await loadUsers();
        const hashedPassword = hashPassword(password);
        const user = users.find(u => u.username === username && u.password === hashedPassword);

        if (user) {
            currentUser = username;
            currentUserData = user;
            userChats = user.chats || [];
            
            // Удаляем экран авторизации
            const authScreen = document.querySelector('div[style*="position: fixed"][style*="z-index: 2000"]');
            if (authScreen) authScreen.remove();
            
            // Обновляем UI
            document.getElementById('sidebarAvatar').innerHTML = username.charAt(0).toUpperCase();
            document.getElementById('sidebarName').innerHTML = username;
            
            // Загружаем чаты
            renderChatsList();
            
            // Если есть чаты, открываем первый
            if (userChats.length > 0) {
                switchChat(userChats[0].seed);
            }
        } else {
            messageEl.textContent = '❌ Неверный ник или пароль';
        }
    }

    // ========== ФУНКЦИИ ЧАТОВ ==========
    function renderChatsList() {
        const chatsList = document.getElementById('chatsList');
        
        if (userChats.length === 0) {
            chatsList.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px;">Нет чатов<br>Нажмите "+ Новый чат"</div>';
            return;
        }
        
        chatsList.innerHTML = userChats.map(chat => `
            <div class="chat-item ${currentChatSeed === chat.seed ? 'active' : ''}" onclick="switchChat('${chat.seed}')">
                <div class="chat-name">${escapeHtml(chat.name || chat.seed)}</div>
                <div class="chat-preview">${escapeHtml(chat.lastMessage || 'Нет сообщений')}</div>
            </div>
        `).join('');
    }

    function showNewChatModal() {
        document.getElementById('newChatModal').classList.add('active');
        document.getElementById('newChatSeed').value = '';
    }

    function closeModal() {
        document.getElementById('newChatModal').classList.remove('active');
    }

    async function createNewChat() {
        const seed = document.getElementById('newChatSeed').value.trim();
        
        if (!seed) {
            alert('Введите сид чата');
            return;
        }
        
        // Проверяем, не существует ли уже такой чат
        if (userChats.some(chat => chat.seed === seed)) {
            alert('Этот чат уже есть в списке');
            closeModal();
            return;
        }
        
        // Добавляем новый чат
        const newChat = {
            seed: seed,
            name: seed,
            lastMessage: 'Новый чат',
            lastSeen: Date.now()
        };
        
        userChats.push(newChat);
        await saveUserChats();
        
        renderChatsList();
        switchChat(seed);
        closeModal();
    }

    async function switchChat(seed) {
        if (currentChatSeed === seed) return;
        
        // Сохраняем текущий чат перед переключением
        if (currentChatSeed) {
            await saveUserChats();
        }
        
        currentChatSeed = seed;
        
        // Обновляем UI
        document.getElementById('currentChatDisplay').innerHTML = seed;
        renderChatsList();
        
        // Очищаем сообщения
        allMessages = [];
        lastContentHash = '';
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = '';
        
        // Включаем поле ввода
        document.getElementById('msgInput').disabled = false;
        document.querySelector('.input-area button').disabled = false;
        
        // Загружаем сообщения
        await loadMessages(true);
        
        // Запускаем автообновление
        if (updateInterval) {
            clearInterval(updateInterval);
        }
        updateInterval = setInterval(() => loadMessages(false), 3000);
    }

    async function saveUserChats() {
        // Обновляем данные пользователя
        const users = await loadUsers();
        const userIndex = users.findIndex(u => u.username === currentUser);
        
        if (userIndex !== -1) {
            users[userIndex].chats = userChats;
            await saveUsers(users);
            currentUserData = users[userIndex];
        }
    }

    async function updateLastMessage(seed, message) {
        const chat = userChats.find(c => c.seed === seed);
        if (chat) {
            chat.lastMessage = message.length > 50 ? message.substring(0, 50) + '...' : message;
            chat.lastSeen = Date.now();
            await saveUserChats();
            renderChatsList();
        }
    }

    // ========== ФУНКЦИИ ЧАТА ==========
    async function loadMessages(forceReload = false) {
        if (!currentChatSeed) return;
        
        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            
            if (!response.ok) return;
            
            const data = await response.json();
            const content = data.files[FILE_NAME].content || '';
            
            const currentHash = hashString(content);
            if (!forceReload && currentHash === lastContentHash) return;
            
            const lines = content.split('\n').filter(line => line.trim());
            const messagesDiv = document.getElementById('messages');
            
            // Получаем новые сообщения
            const newMessages = [];
            
            for (let line of lines) {
                try {
                    const decrypted = CryptoJS.AES.decrypt(line, currentChatSeed).toString(CryptoJS.enc.Utf8);
                    
                    if (decrypted && decrypted.length > 3) {
                        if (!allMessages.includes(decrypted)) {
                            newMessages.push(decrypted);
                            allMessages.push(decrypted);
                            
                            // Обновляем последнее сообщение для превью
                            if (!decrypted.startsWith(currentUser + ':')) {
                                updateLastMessage(currentChatSeed, decrypted);
                            }
                        }
                    }
                } catch (e) {}
            }
            
            if (newMessages.length > 0 || forceReload) {
                if (forceReload) {
                    messagesDiv.innerHTML = '';
                    allMessages.forEach(msg => displayMessage(msg));
                } else {
                    newMessages.forEach(msg => displayMessage(msg));
                }
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
            
            lastContentHash = currentHash;
            
            if (messagesDiv.children.length === 0) {
                messagesDiv.innerHTML = '<div class="empty-chat">💬 Пока нет сообщений</div>';
            }
            
        } catch (err) {
            console.error('Ошибка загрузки:', err);
        }
    }

    function displayMessage(message) {
        const messagesDiv = document.getElementById('messages');
        
        if (messagesDiv.children.length === 1 && messagesDiv.children[0].classList.contains('empty-chat')) {
            messagesDiv.innerHTML = '';
        }
        
        const isOwnMessage = message.startsWith(currentUser + ':');
        const messageClass = isOwnMessage ? 'msg-item own' : 'msg-item other';
        
        const messageDiv = document.createElement('div');
        messageDiv.className = messageClass;
        messageDiv.textContent = message;
        
        messagesDiv.appendChild(messageDiv);
    }

    async function sendMessage() {
        if (!currentChatSeed) {
            alert('Сначала выберите чат');
            return;
        }
        
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        
        if (!text) return;
        
        const fullMessage = `${currentUser}: ${text}`;
        const encrypted = CryptoJS.AES.encrypt(fullMessage, currentChatSeed).toString();
        
        try {
            const getResp = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            
            if (!getResp.ok) throw new Error('Ошибка');
            
            const getData = await getResp.json();
            const oldContent = getData.files[FILE_NAME]?.content || '';
            const newContent = oldContent + (oldContent ? '\n' : '') + encrypted;
            
            const patchResp = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: { [FILE_NAME]: { content: newContent } }
                })
            });
            
            if (patchResp.ok) {
                input.value = '';
                
                if (!allMessages.includes(fullMessage)) {
                    allMessages.push(fullMessage);
                    displayMessage(fullMessage);
                    
                    const messagesDiv = document.getElementById('messages');
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
                
                // Обновляем последнее сообщение
                updateLastMessage(currentChatSeed, fullMessage);
                lastContentHash = '';
            } else {
                alert('Ошибка отправки');
            }
        } catch (err) {
            alert('Ошибка отправки');
        }
    }

    function hashString(str) {
        return CryptoJS.SHA256(str).toString();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    showAuthScreen();

    // Обработчики
    document.getElementById('msgInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !this.disabled) {
            sendMessage();
        }
    });
    
    document.getElementById('newChatSeed').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            createNewChat();
        }
    });
</script>
