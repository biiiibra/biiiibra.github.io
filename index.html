<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌋 MAGMA · private chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b00;
            --primary-glow: rgba(255, 107, 0, 0.5);
            --primary-dark: #cc5500;
            --bg-dark: #0a0500;
            --bg-glass: rgba(20, 12, 5, 0.4);
            --glass-border: rgba(255, 107, 0, 0.15);
            --text-primary: #ffd0b0;
            --text-secondary: #b38b6b;
            --surface: rgba(30, 18, 8, 0.6);
            --error: #ff4444;
            --success: #44ff88;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Анимированный фон с градиентом */
        body::before {
            content: '';
            position: fixed;
            width: 200vmax;
            height: 200vmax;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at center, 
                rgba(255, 107, 0, 0.15) 0%,
                rgba(255, 68, 0, 0.1) 25%,
                rgba(10, 5, 0, 0) 50%);
            animation: rotate 60s linear infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 107, 0, 0.02) 0px,
                rgba(255, 107, 0, 0.02) 2px,
                transparent 2px,
                transparent 8px
            );
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Частицы */
        #particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            opacity: 0.3;
            animation: float linear infinite;
        }

        @keyframes float {
            from { transform: translateY(100vh) scale(0); opacity: 0; }
            to { transform: translateY(-100vh) scale(1); opacity: 0.5; }
        }

        /* Кнопка скачивания */
        .download-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 12px 28px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.3px;
        }

        .download-btn:hover {
            background: rgba(255, 107, 0, 0.15);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(255, 107, 0, 0.3);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 600px) {
            .download-btn {
                top: 16px;
                right: 16px;
                padding: 10px 20px;
                font-size: 13px;
            }
        }

        /* Основной контейнер */
        .container {
            width: 90%;
            max-width: 500px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            overflow: hidden;
            height: 80vh;
            max-height: 750px;
            transition: transform 0.3s ease;
        }

        /* ЭКРАНЫ АВТОРИЗАЦИИ */
        #auth-screen {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px 28px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #ff8c40, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 20px rgba(255, 107, 0, 0.5));
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 14px;
            letter-spacing: 1px;
        }

        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 60px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--primary), #ff4500);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.4);
        }

        .auth-form {
            display: none;
            animation: slideUp 0.4s ease;
        }

        .auth-form.active {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 18px;
        }

        input, .glass-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1);
        }

        input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .glass-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #ff4500);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 69, 0, 0.4);
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .glass-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 69, 0, 0.6);
        }

        .glass-button:active {
            transform: translateY(0);
        }

        /* ЭКРАН ЧАТА */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
        }

        .chat-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #ff4500);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
        }

        #display-name {
            font-weight: 600;
            font-size: 16px;
        }

        .connection-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 8px;
            background: #888;
            transition: all 0.3s ease;
        }

        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .chat-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 36px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 16px;
        }

        .icon-btn:hover {
            background: rgba(255, 107, 0, 0.2);
            border-color: var(--primary);
            transform: scale(1.05);
        }

        /* Стили для чекбокса озвучивания */
        .voice-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .voice-checkbox:hover {
            border-color: var(--primary);
            background: rgba(255, 107, 0, 0.1);
        }

        .voice-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .voice-checkbox.active {
            border-color: var(--primary);
            background: rgba(255, 107, 0, 0.15);
        }

        .chat-header-bottom {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .chat-input-group {
            flex: 1;
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 60px;
        }

        #chatSeed {
            flex: 1;
            padding: 12px 18px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        #chatSeed::placeholder {
            color: var(--text-secondary);
        }

        .join-chat-btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, var(--primary), #ff4500);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            white-space: nowrap;
        }

        .current-chat {
            padding: 6px 14px;
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid rgba(255, 107, 0, 0.3);
            border-radius: 40px;
            font-size: 13px;
            color: var(--primary);
            white-space: nowrap;
        }

        /* Сообщения */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-item {
            background: rgba(30, 18, 8, 0.6);
            backdrop-filter: blur(10px);
            padding: 14px 20px;
            border-radius: 24px;
            max-width: 85%;
            word-wrap: break-word;
            align-self: flex-start;
            border: 1px solid rgba(255, 107, 0, 0.15);
            border-left: 4px solid var(--primary);
            animation: messageIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .msg-item.own-message {
            border-left-color: var(--success);
            align-self: flex-end;
            background: rgba(68, 255, 136, 0.1);
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .empty-chat {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
            font-style: italic;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
            border: 1px dashed var(--glass-border);
        }

        /* Поле ввода */
        .input-area {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .message-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .message-input-wrapper:focus-within {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1);
        }

        #msgInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 8px 12px 0;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        #msgInput:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 48px;
            background: linear-gradient(135deg, var(--primary), #ff4500);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05) rotate(90deg);
            box-shadow: 0 6px 20px rgba(255, 69, 0, 0.5);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Уведомления */
        .error-message, .success-message {
            padding: 12px 20px;
            border-radius: 40px;
            text-align: center;
            font-size: 14px;
            animation: slideUp 0.3s ease;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid var(--error);
            color: #ff8888;
        }

        .success-message {
            background: rgba(68, 255, 136, 0.15);
            border: 1px solid var(--success);
            color: #88ffaa;
        }

        /* Анимации */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>

<!-- Контейнер -->
<div class="container">
    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-screen">
        <div class="auth-header">
            <h1>🌋 MAGMA</h1>
            <p>private encrypted chat</p>
        </div>

        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchAuthTab('login')">Вход</div>
            <div class="auth-tab" onclick="switchAuthTab('register')">Регистрация</div>
        </div>

        <!-- ФОРМА ВХОДА -->
        <div id="login-form" class="auth-form active">
            <div class="input-group">
                <span style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%);">👤</span>
                <input type="text" id="login-username" placeholder="никнейм" autocomplete="off">
            </div>
            <div class="input-group">
                <span style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%);">🔒</span>
                <input type="password" id="login-password" placeholder="пароль">
            </div>
            <button class="glass-button" onclick="login()">Войти</button>
            <div id="login-message" class="error-message"></div>
        </div>

        <!-- ФОРМА РЕГИСТРАЦИИ -->
        <div id="register-form" class="auth-form">
            <div class="input-group">
                <span style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%);">👤</span>
                <input type="text" id="register-username" placeholder="никнейм" autocomplete="off">
            </div>
            <div class="input-group">
                <span style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%);">🔒</span>
                <input type="password" id="register-password" placeholder="пароль">
            </div>
            <div class="input-group">
                <span style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%);">✓</span>
                <input type="password" id="register-confirm" placeholder="подтвердите пароль">
            </div>
            <button class="glass-button" onclick="register()">Зарегистрироваться</button>
            <div id="register-message" class="error-message"></div>
        </div>
    </div>

    <!-- ЭКРАН ЧАТА -->
    <div id="chat-screen">
        <div class="chat-header">
            <div class="chat-header-top">
                <div class="user-info">
                    <div class="avatar" id="avatar">👤</div>
                    <span id="display-name"></span>
                </div>
                <div class="connection-badge">
                    <span class="status-dot" id="statusDot"></span>
                    <span class="status-text" id="statusText">Подключение...</span>
                </div>
                <div class="chat-actions">
                    <label class="voice-checkbox" id="voiceCheckbox" title="Озвучивать сообщения">
                        <input type="checkbox" id="voiceToggle" onchange="toggleVoice()">
                        <span>🔊</span>
                    </label>
                    <div id="sound-toggle" class="icon-btn" onclick="toggleSound()">
                        <span class="sound-indicator">🔊</span>
                    </div>
                    <button class="icon-btn" onclick="loadMessages(true)">🔄</button>
                    <button class="icon-btn" onclick="logout()">🚪</button>
                </div>
            </div>
            <div class="chat-header-bottom">
                <div class="chat-input-group">
                    <input type="text" id="chatSeed" placeholder="сид чата" autocomplete="off">
                    <button class="join-chat-btn" onclick="joinChat()">Войти</button>
                </div>
                <span id="currentChatName" class="current-chat"></span>
            </div>
        </div>
        
        <div id="messages"></div>

        <div class="input-area">
            <div class="message-input-wrapper">
                <span style="color: var(--text-secondary); margin-right: 8px;">💬</span>
                <input type="text" id="msgInput" placeholder="сообщение..." autocomplete="off" disabled>
            </div>
            <button class="send-btn" onclick="sendMessage()" disabled>➤</button>
        </div>
    </div>
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const GITHUB_TOKEN = 'ghp_5GhNw2IFw' + 'SNBiCarLnNWF6' + 'zMHi4hNW4LgR4N';
    const GIST_ID = '3c13a9018358fc6dd01e0ec2df85f740';
    const USERS_GIST_ID = 'd0ff1e8a01417e7931279eb563198dba';
    const FILE_NAME = 'chat.txt';
    const USERS_FILE = 'users.json';

    // ==================== ПЕРЕМЕННЫЕ ====================
    let currentUser = '';
    let currentChatSeed = '';
    let autoUpdateInterval = null;
    let displayedMessages = new Set();
    let messageHashes = new Set();
    let isGitHubWorking = false;
    let soundEnabled = true;
    let voiceEnabled = false; // Новая переменная для озвучивания
    let notificationSound = null;
    let lastContentHash = '';
    let isUpdating = false;
    let speechSynthesis = window.speechSynthesis; // Для озвучивания
    let lastSpokenMessage = ''; // Чтобы не повторять одно и то же

    // Создание частиц
    function createParticles() {
        const particlesContainer = document.createElement('div');
        particlesContainer.id = 'particles';
        document.body.appendChild(particlesContainer);

        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.width = (Math.random() * 3 + 1) + 'px';
            particle.style.height = particle.style.width;
            particle.style.opacity = Math.random() * 0.3 + 0.1;
            particlesContainer.appendChild(particle);
        }
    }

    createParticles();

    // Инициализация звука
    try {
        notificationSound = new Audio('data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVAAAAA8AP8A/gD+AP4A/gD+AP4A/gD+AP4A/gD+AP4A/gD+AP4A/gD+AP4A/gD+AP4A/gD+AP4A/gD+AP4A/gA=');
        notificationSound.volume = 0.2;
    } catch (e) {}

    // ==================== ФУНКЦИИ АВТОРИЗАЦИИ ====================
    
    function switchAuthTab(tab) {
        const tabs = document.querySelectorAll('.auth-tab');
        const forms = document.querySelectorAll('.auth-form');
        
        tabs.forEach(t => t.classList.remove('active'));
        forms.forEach(f => f.classList.remove('active'));
        
        if (tab === 'login') {
            tabs[0].classList.add('active');
            document.getElementById('login-form').classList.add('active');
        } else {
            tabs[1].classList.add('active');
            document.getElementById('register-form').classList.add('active');
        }
    }

    function hashPassword(password) {
        return CryptoJS.SHA256(password).toString();
    }

    function hashString(str) {
        return CryptoJS.SHA256(str).toString();
    }

    async function loadUsers() {
        try {
            const response = await fetch(`https://api.github.com/gists/${USERS_GIST_ID}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            if (!response.ok) return [];
            const data = await response.json();
            return JSON.parse(data.files[USERS_FILE].content || '[]');
        } catch (err) {
            return [];
        }
    }

    async function saveUsers(users) {
        try {
            const response = await fetch(`https://api.github.com/gists/${USERS_GIST_ID}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: { [USERS_FILE]: { content: JSON.stringify(users, null, 2) } }
                })
            });
            return response.ok;
        } catch (err) {
            return false;
        }
    }

    async function register() {
        const username = document.getElementById('register-username').value.trim();
        const password = document.getElementById('register-password').value.trim();
        const confirm = document.getElementById('register-confirm').value.trim();
        const messageEl = document.getElementById('register-message');

        if (!username || !password || !confirm) {
            messageEl.textContent = '❌ Заполните все поля';
            return;
        }

        if (password !== confirm) {
            messageEl.textContent = '❌ Пароли не совпадают';
            return;
        }

        if (password.length < 3) {
            messageEl.textContent = '❌ Пароль должен быть минимум 3 символа';
            return;
        }

        const users = await loadUsers();
        
        if (users.some(u => u.username === username)) {
            messageEl.textContent = '❌ Пользователь уже существует';
            return;
        }

        users.push({
            username: username,
            password: hashPassword(password),
            created: new Date().toISOString()
        });

        const saved = await saveUsers(users);
        
        if (saved) {
            messageEl.className = 'success-message';
            messageEl.textContent = '✅ Регистрация успешна!';
            
            document.getElementById('register-username').value = '';
            document.getElementById('register-password').value = '';
            document.getElementById('register-confirm').value = '';
            
            setTimeout(() => {
                switchAuthTab('login');
                messageEl.textContent = '';
                messageEl.className = 'error-message';
            }, 2000);
        }
    }

    async function login() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        const messageEl = document.getElementById('login-message');

        if (!username || !password) {
            messageEl.textContent = '❌ Введите ник и пароль';
            return;
        }

        const users = await loadUsers();
        const hashedPassword = hashPassword(password);
        const user = users.find(u => u.username === username && u.password === hashedPassword);

        if (user) {
            currentUser = username;
            document.getElementById('avatar').innerText = username.charAt(0).toUpperCase();
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('display-name').innerText = currentUser;
            
            loadSoundSetting();
            loadVoiceSetting(); // Загружаем настройку озвучивания
            await checkGitHubConnection();
        } else {
            messageEl.textContent = '❌ Неверный ник или пароль';
        }
    }

    function logout() {
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('auth-screen').style.display = 'flex';
        
        document.getElementById('login-username').value = '';
        document.getElementById('login-password').value = '';
        document.getElementById('chatSeed').value = '';
        document.getElementById('currentChatName').innerText = '';
        
        disableChatInput();
        
        currentChatSeed = '';
        displayedMessages.clear();
        messageHashes.clear();
        
        if (autoUpdateInterval) {
            clearInterval(autoUpdateInterval);
            autoUpdateInterval = null;
        }
        
        // Останавливаем озвучивание
        if (speechSynthesis.speaking) {
            speechSynthesis.cancel();
        }
    }

    // ==================== ФУНКЦИИ ЧАТА ====================

    function enableChatInput() {
        document.getElementById('msgInput').disabled = false;
        document.querySelector('.send-btn').disabled = false;
        document.getElementById('msgInput').placeholder = 'сообщение...';
    }

    function disableChatInput() {
        document.getElementById('msgInput').disabled = true;
        document.querySelector('.send-btn').disabled = true;
        document.getElementById('msgInput').placeholder = 'войдите в чат...';
    }

    async function checkGitHubConnection() {
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        
        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            
            if (response.ok) {
                statusDot.className = 'status-dot connected';
                statusText.textContent = 'Подключено';
                isGitHubWorking = true;
                
                if (currentChatSeed) {
                    enableChatInput();
                }
                return true;
            } else {
                statusDot.className = 'status-dot';
                statusText.textContent = 'Ошибка';
                isGitHubWorking = false;
                disableChatInput();
                return false;
            }
        } catch (err) {
            statusDot.className = 'status-dot';
            statusText.textContent = 'Нет сети';
            isGitHubWorking = false;
            disableChatInput();
            return false;
        }
    }

    function joinChat() {
        const seed = document.getElementById('chatSeed').value.trim();
        
        if (!seed) {
            alert('Введите сид чата');
            return;
        }
        
        if (!isGitHubWorking) {
            alert('Нет подключения');
            return;
        }
        
        currentChatSeed = seed;
        document.getElementById('currentChatName').innerText = `📁 ${seed}`;
        
        enableChatInput();
        
        displayedMessages.clear();
        messageHashes.clear();
        document.getElementById('messages').innerHTML = '';
        lastContentHash = '';
        
        loadMessages(true);
        
        if (autoUpdateInterval) {
            clearInterval(autoUpdateInterval);
        }
        autoUpdateInterval = setInterval(() => loadMessages(false), 3000);
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        const indicator = document.querySelector('.sound-indicator');
        indicator.textContent = soundEnabled ? '🔊' : '🔈';
        localStorage.setItem('magmaSoundEnabled', soundEnabled);
    }

    // Новая функция для переключения озвучивания
    function toggleVoice() {
        voiceEnabled = document.getElementById('voiceToggle').checked;
        localStorage.setItem('magmaVoiceEnabled', voiceEnabled);
        
        // Обновляем класс для визуального эффекта
        const checkbox = document.getElementById('voiceCheckbox');
        if (voiceEnabled) {
            checkbox.classList.add('active');
        } else {
            checkbox.classList.remove('active');
        }
    }

    function loadSoundSetting() {
        const saved = localStorage.getItem('magmaSoundEnabled');
        if (saved !== null) {
            soundEnabled = saved === 'true';
            document.querySelector('.sound-indicator').textContent = soundEnabled ? '🔊' : '🔈';
        }
    }

    function loadVoiceSetting() {
        const saved = localStorage.getItem('magmaVoiceEnabled');
        if (saved !== null) {
            voiceEnabled = saved === 'true';
            document.getElementById('voiceToggle').checked = voiceEnabled;
            
            const checkbox = document.getElementById('voiceCheckbox');
            if (voiceEnabled) {
                checkbox.classList.add('active');
            } else {
                checkbox.classList.remove('active');
            }
        }
    }

    // Новая функция для озвучивания сообщения
    function speakMessage(message) {
        if (!voiceEnabled || !message || message === lastSpokenMessage) return;
        
        // Не озвучиваем свои сообщения
        if (message.startsWith(currentUser + ':')) return;
        
        // Останавливаем предыдущее озвучивание, если оно еще идет
        if (speechSynthesis.speaking) {
            speechSynthesis.cancel();
        }
        
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.9; // Немного медленнее для лучшего понимания
        utterance.pitch = 1;
        utterance.volume = 1;
        
        // Выбираем русский голос, если доступен
        const voices = speechSynthesis.getVoices();
        const russianVoice = voices.find(voice => voice.lang.includes('ru'));
        if (russianVoice) {
            utterance.voice = russianVoice;
        }
        
        speechSynthesis.speak(utterance);
        lastSpokenMessage = message;
    }

    document.getElementById('msgInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });

    document.getElementById('chatSeed').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') joinChat();
    });

async function loadMessages(forceReload = false) {
    if (isUpdating && !forceReload) return;
    if (!isGitHubWorking || !currentChatSeed) return;
    
    isUpdating = true;
    const msgDiv = document.getElementById('messages');
    
    try {
        const response = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        
        if (!response.ok) throw new Error('Ошибка');
        
        const data = await response.json();
        const content = data.files[FILE_NAME].content || '';
        
        const currentHash = hashString(content);
        if (!forceReload && currentHash === lastContentHash) {
            isUpdating = false;
            return;
        }
        
        const lines = content.split('\n').filter(line => line.trim());
        
        if (forceReload) {
            msgDiv.innerHTML = '';
            displayedMessages.clear();
            messageHashes.clear();
        }
        
        // ВАЖНО: Сохраняем текущие сообщения, чтобы проверить дубликаты
        const existingMessages = new Set();
        for (let i = 0; i < msgDiv.children.length; i++) {
            const child = msgDiv.children[i];
            if (!child.classList.contains('empty-chat')) {
                existingMessages.add(child.textContent);
            }
        }
        
        for (let line of lines) {
            try {
                const bytes = CryptoJS.AES.decrypt(line, currentChatSeed);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                
                if (decrypted && decrypted.length > 3) {
                    const messageHash = hashString(decrypted);
                    
                    // Проверяем на дубликаты по хэшу и по содержимому
                    if (!messageHashes.has(messageHash) && !existingMessages.has(decrypted)) {
                        messageHashes.add(messageHash);
                        displayedMessages.add(decrypted);
                        
                        const isOwnMessage = decrypted.startsWith(currentUser + ':');
                        const messageClass = isOwnMessage ? 'msg-item own-message' : 'msg-item';
                        msgDiv.innerHTML += `<div class="${messageClass}">${decrypted}</div>`;
                        
                        if (!forceReload && !isOwnMessage) {
                            playNotificationSound();
                            speakMessage(decrypted);
                        }
                    }
                }
            } catch (e) {}
        }
        
        lastContentHash = currentHash;
        
        if (msgDiv.children.length === 0) {
            msgDiv.innerHTML = '<div class="empty-chat">🌋 пока нет сообщений</div>';
        }
        
        msgDiv.scrollTop = msgDiv.scrollHeight;
        
    } catch (err) {
        console.error('Ошибка:', err);
    } finally {
        isUpdating = false;
    }
}

    async function sendMessage() {
        if (!isGitHubWorking || !currentChatSeed) {
            alert('Сначала войдите в чат');
            return;
        }
        
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        const fullMessage = `${currentUser}: ${text}`;
        const encrypted = CryptoJS.AES.encrypt(fullMessage, currentChatSeed).toString();

        input.value = '';

        try {
            const getResp = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            
            const getData = await getResp.json();
            const oldContent = getData.files[FILE_NAME]?.content || '';
            const newContent = oldContent + (oldContent ? '\n' : '') + encrypted;

            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: { [FILE_NAME]: { content: newContent } }
                })
            });
            
            const msgDiv = document.getElementById('messages');
            
            if (msgDiv.children.length === 1 && msgDiv.children[0].classList.contains('empty-chat')) {
                msgDiv.innerHTML = '';
            }
            
            msgDiv.innerHTML += `<div class="msg-item own-message">${fullMessage}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
            
            lastContentHash = '';
            
        } catch (err) {
            alert('Ошибка отправки');
        }
    }

    function playNotificationSound() {
        if (!soundEnabled || !notificationSound) return;
        notificationSound.currentTime = 0;
        notificationSound.play().catch(e => {});
    }

    // Периодическая проверка подключения
    setInterval(checkGitHubConnection, 30000);
</script>
