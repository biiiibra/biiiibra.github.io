<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKIP · private chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00a8ff;
            --primary-glow: rgba(0, 168, 255, 0.5);
            --primary-dark: #0097ea;
            --bg-dark: #0a0a1a;
            --bg-glass: rgba(26, 26, 46, 0.6);
            --glass-border: rgba(0, 168, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --surface: rgba(26, 26, 46, 0.8);
            --error: #ff4444;
            --success: #44ff88;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 200vmax;
            height: 200vmax;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at center, 
                rgba(0, 168, 255, 0.1) 0%,
                rgba(0, 168, 255, 0.05) 25%,
                rgba(10, 10, 26, 0) 50%);
            animation: rotate 60s linear infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(0, 168, 255, 0.02) 0px,
                rgba(0, 168, 255, 0.02) 2px,
                transparent 2px,
                transparent 8px
            );
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Основной контейнер */
        .container {
            width: 90%;
            max-width: 500px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            overflow: hidden;
            height: 80vh;
            max-height: 750px;
        }

        /* ЭКРАНЫ АВТОРИЗАЦИИ */
        #auth-screen {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px 28px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header h1 {
            font-size: 3em;
            background: linear-gradient(135deg, var(--primary), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 60px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(0, 168, 255, 0.4);
        }

        .auth-form {
            display: none;
            animation: slideUp 0.4s ease;
        }

        .auth-form.active {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(0, 168, 255, 0.1);
        }

        .glass-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* ЭКРАН ЧАТА */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-item {
            background: var(--surface);
            padding: 14px 20px;
            border-radius: 24px;
            max-width: 85%;
            word-wrap: break-word;
            align-self: flex-start;
            border-left: 4px solid var(--primary);
            animation: messageIn 0.3s ease;
        }

        .msg-item.own-message {
            border-left-color: var(--success);
            align-self: flex-end;
            background: rgba(68, 255, 136, 0.1);
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .input-area {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
        }

        .message-input-wrapper {
            flex: 1;
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            border: 1px solid var(--glass-border);
        }

        #msgInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 8px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 45px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .theme-switch:hover {
            transform: scale(1.1);
            border-color: var(--primary);
        }
    </style>
</head>
<body>

<div class="theme-switch" onclick="toggleTheme()">
    <span class="theme-icon">🎨</span>
</div>

<div class="container">
    <div id="auth-screen">
        <div class="auth-header">
            <h1>SKIP</h1>
            <p>private encrypted chat</p>
        </div>

        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchAuthTab('login')">Вход</div>
            <div class="auth-tab" onclick="switchAuthTab('register')">Регистрация</div>
        </div>

        <div id="login-form" class="auth-form active">
            <input type="text" id="login-username" placeholder="никнейм">
            <input type="password" id="login-password" placeholder="пароль">
            <button class="glass-button" onclick="login()">Войти</button>
            <div id="login-message" style="color: var(--error); text-align: center;"></div>
        </div>

        <div id="register-form" class="auth-form">
            <input type="text" id="register-username" placeholder="никнейм">
            <input type="password" id="register-password" placeholder="пароль">
            <input type="password" id="register-confirm" placeholder="подтвердите пароль">
            <button class="glass-button" onclick="register()">Зарегистрироваться</button>
            <div id="register-message" style="color: var(--error); text-align: center;"></div>
        </div>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <div class="user-info">
                <div class="avatar" id="avatar">👤</div>
                <span id="display-name"></span>
                <button class="icon-btn" onclick="logout()" style="margin-left: auto;">🚪</button>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="text" id="chatSeed" placeholder="сид чата" style="flex: 1;">
                <button class="join-chat-btn" onclick="joinChat()">Войти</button>
            </div>
            <span id="currentChatName" class="current-chat"></span>
        </div>
        
        <div id="messages"></div>

        <div class="input-area">
            <div class="message-input-wrapper">
                <input type="text" id="msgInput" placeholder="сообщение..." disabled>
            </div>
            <button class="send-btn" onclick="sendMessage()" disabled>➤</button>
        </div>
    </div>
</div>

<script>
    // Токены (те же самые)
    const GITHUB_TOKEN = 'ghp_5GhNw2IFw' + 'SNBiCarLnNWF6zMHi4hNW4LgR4N';
    const GIST_ID = '3c13a9018358fc6dd01e0ec2df85f740';
    const USERS_GIST_ID = 'd0ff1e8a01417e7931279eb563198dba';
    const FILE_NAME = 'chat.txt';
    const USERS_FILE = 'users.json';

    let currentUser = '';
    let currentChatSeed = '';
    let messageHashes = new Set();
    let updateInterval = null;
    let lastContentHash = '';

    function switchAuthTab(tab) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        
        if (tab === 'login') {
            document.querySelectorAll('.auth-tab')[0].classList.add('active');
            document.getElementById('login-form').classList.add('active');
        } else {
            document.querySelectorAll('.auth-tab')[1].classList.add('active');
            document.getElementById('register-form').classList.add('active');
        }
    }

    function hashPassword(pwd) {
        return CryptoJS.SHA256(pwd).toString();
    }

    function hashString(str) {
        return CryptoJS.SHA256(str).toString();
    }

    async function loadUsers() {
        try {
            const r = await fetch(`https://api.github.com/gists/${USERS_GIST_ID}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            if (!r.ok) return [];
            const data = await r.json();
            return JSON.parse(data.files[USERS_FILE].content || '[]');
        } catch(e) { return []; }
    }

    async function saveUsers(users) {
        try {
            const r = await fetch(`https://api.github.com/gists/${USERS_GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ files: { [USERS_FILE]: { content: JSON.stringify(users, null, 2) } } })
            });
            return r.ok;
        } catch(e) { return false; }
    }

    async function register() {
        const username = document.getElementById('register-username').value.trim();
        const password = document.getElementById('register-password').value.trim();
        const confirm = document.getElementById('register-confirm').value.trim();
        const msgEl = document.getElementById('register-message');

        if (!username || !password || !confirm) {
            msgEl.textContent = '❌ Заполните все поля';
            return;
        }
        if (password !== confirm) {
            msgEl.textContent = '❌ Пароли не совпадают';
            return;
        }
        if (password.length < 3) {
            msgEl.textContent = '❌ Пароль минимум 3 символа';
            return;
        }

        const users = await loadUsers();
        if (users.some(u => u.username === username)) {
            msgEl.textContent = '❌ Пользователь уже существует';
            return;
        }

        users.push({ username: username, password: hashPassword(password), created: new Date().toISOString() });
        
        if (await saveUsers(users)) {
            msgEl.style.color = '#44ff88';
            msgEl.textContent = '✅ Регистрация успешна!';
            setTimeout(() => switchAuthTab('login'), 2000);
        } else {
            msgEl.textContent = '❌ Ошибка регистрации';
        }
    }

    async function login() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        const msgEl = document.getElementById('login-message');

        if (!username || !password) {
            msgEl.textContent = '❌ Введите ник и пароль';
            return;
        }

        const users = await loadUsers();
        const user = users.find(u => u.username === username && u.password === hashPassword(password));

        if (user) {
            currentUser = username;
            document.getElementById('avatar').innerText = username.charAt(0).toUpperCase();
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('display-name').innerText = currentUser;
            document.getElementById('login-message').textContent = '';
        } else {
            msgEl.textContent = '❌ Неверный ник или пароль';
        }
    }

    function logout() {
        if (updateInterval) clearInterval(updateInterval);
        currentChatSeed = '';
        messageHashes.clear();
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('chatSeed').value = '';
        document.getElementById('currentChatName').innerText = '';
        document.getElementById('msgInput').disabled = true;
        document.querySelector('.send-btn').disabled = true;
        document.getElementById('messages').innerHTML = '';
    }

    function joinChat() {
        const seed = document.getElementById('chatSeed').value.trim();
        if (!seed) {
            alert('Введите сид чата');
            return;
        }
        
        currentChatSeed = seed;
        document.getElementById('currentChatName').innerText = `📁 ${seed}`;
        document.getElementById('msgInput').disabled = false;
        document.querySelector('.send-btn').disabled = false;
        
        messageHashes.clear();
        document.getElementById('messages').innerHTML = '';
        lastContentHash = '';
        
        loadMessages(true);
        
        if (updateInterval) clearInterval(updateInterval);
        updateInterval = setInterval(() => loadMessages(false), 3000);
    }

    async function loadMessages(forceReload = false) {
        if (!currentChatSeed) return;
        
        try {
            const r = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            if (!r.ok) return;
            
            const data = await r.json();
            const content = data.files[FILE_NAME].content || '';
            
            const currentHash = hashString(content);
            if (!forceReload && currentHash === lastContentHash) return;
            
            const lines = content.split('\n').filter(l => l.trim());
            const msgDiv = document.getElementById('messages');
            
            if (forceReload) {
                msgDiv.innerHTML = '';
                messageHashes.clear();
            }
            
            // Сохраняем существующие сообщения для проверки дубликатов
            const existingMessages = new Set();
            for (let i = 0; i < msgDiv.children.length; i++) {
                existingMessages.add(msgDiv.children[i].textContent);
            }
            
            for (let line of lines) {
                try {
                    const decrypted = CryptoJS.AES.decrypt(line, currentChatSeed).toString(CryptoJS.enc.Utf8);
                    if (decrypted && decrypted.length > 3) {
                        const msgHash = hashString(decrypted);
                        
                        if (!messageHashes.has(msgHash) && !existingMessages.has(decrypted)) {
                            messageHashes.add(msgHash);
                            const isOwn = decrypted.startsWith(currentUser + ':');
                            const msgClass = isOwn ? 'msg-item own-message' : 'msg-item';
                            msgDiv.innerHTML += `<div class="${msgClass}">${decrypted}</div>`;
                        }
                    }
                } catch(e) {}
            }
            
            lastContentHash = currentHash;
            
            if (msgDiv.children.length === 0) {
                msgDiv.innerHTML = '<div class="empty-chat">💬 пока нет сообщений</div>';
            }
            
            msgDiv.scrollTop = msgDiv.scrollHeight;
        } catch(e) {
            console.error(e);
        }
    }

    async function sendMessage() {
        if (!currentChatSeed) {
            alert('Сначала войдите в чат');
            return;
        }
        
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;
        
        const fullMessage = `${currentUser}: ${text}`;
        const encrypted = CryptoJS.AES.encrypt(fullMessage, currentChatSeed).toString();
        
        try {
            const getR = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            const data = await getR.json();
            const oldContent = data.files[FILE_NAME].content || '';
            const newContent = oldContent + (oldContent ? '\n' : '') + encrypted;
            
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ files: { [FILE_NAME]: { content: newContent } } })
            });
            
            input.value = '';
            loadMessages(true);
        } catch(e) {
            alert('Ошибка отправки');
        }
    }

    function toggleTheme() {
        const root = document.documentElement;
        const primary = getComputedStyle(root).getPropertyValue('--primary').trim();
        
        if (primary === '#00a8ff') {
            root.style.setProperty('--primary', '#ff6b00');
            root.style.setProperty('--primary-dark', '#cc5500');
            root.style.setProperty('--bg-dark', '#0a0500');
            localStorage.setItem('theme', 'orange');
        } else {
            root.style.setProperty('--primary', '#00a8ff');
            root.style.setProperty('--primary-dark', '#0097ea');
            root.style.setProperty('--bg-dark', '#0a0a1a');
            localStorage.setItem('theme', 'blue');
        }
    }

    function loadTheme() {
        const theme = localStorage.getItem('theme');
        const root = document.documentElement;
        if (theme === 'orange') {
            root.style.setProperty('--primary', '#ff6b00');
            root.style.setProperty('--primary-dark', '#cc5500');
            root.style.setProperty('--bg-dark', '#0a0500');
        }
    }

    loadTheme();
    document.getElementById('msgInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
    document.getElementById('chatSeed').addEventListener('keypress', e => { if (e.key === 'Enter') joinChat(); });
</script>

</body>
</html>
