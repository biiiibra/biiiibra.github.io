<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SKIP · private chat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0d0d0f;
  --ink2:#1a1a1f;
  --ink3:#252530;
  --line:rgba(255,255,255,0.07);
  --line2:rgba(255,255,255,0.13);
  --cyan:#00ffe0;
  --cyan2:#00c9b1;
  --mag:#ff2d78;
  --text:#f0f0f5;
  --muted:#606070;
  --muted2:#404050;
  --r:12px;
  --r2:20px;
  --fu:'Syne',sans-serif;
  --fm:'DM Mono',monospace;
}
html{height:100%;height:-webkit-fill-available}
body{
  background:var(--ink);color:var(--text);
  font-family:var(--fm);
  height:100vh;height:-webkit-fill-available;
  overflow:hidden;font-size:14px;
}

/* PARTICLES */
#pc{position:fixed;inset:0;pointer-events:none;z-index:9999}

/* AUTH BG */
#authBg{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  padding:20px;background:var(--ink);
  transition:opacity .7s,transform .7s;overflow:hidden;
}
.alines{
  position:absolute;inset:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,255,224,0.04) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,255,224,0.03) 40px);
}
.aorb{
  position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;
  animation:ofl 10s ease-in-out infinite;
}
.aorb:nth-child(2){width:500px;height:500px;background:rgba(0,255,224,0.055);top:-160px;right:-160px;opacity:.9;animation-delay:0s}
.aorb:nth-child(3){width:350px;height:350px;background:rgba(255,45,120,0.05);bottom:-100px;left:-100px;opacity:.9;animation-delay:-5s}
@keyframes ofl{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,35px)}}

/* AUTH CARD */
.acard{
  position:relative;width:100%;max-width:400px;
  background:var(--ink2);border:1px solid var(--line2);
  border-radius:var(--r2);padding:36px 30px;
  transform-style:preserve-3d;
  transition:transform .1s ease-out;will-change:transform;
  box-shadow:0 0 0 1px rgba(0,255,224,0.04),0 40px 80px rgba(0,0,0,0.65);
}
.acard::before{
  content:'';position:absolute;inset:0;border-radius:var(--r2);
  background:linear-gradient(135deg,rgba(0,255,224,0.04) 0%,transparent 55%);
  pointer-events:none;
}
.cshine{
  position:absolute;inset:0;border-radius:var(--r2);
  pointer-events:none;transition:background .12s ease-out;
  background:radial-gradient(circle at 50% 50%,rgba(0,255,224,0.06) 0%,transparent 60%);
}
.alogo{
  font-family:var(--fu);font-size:46px;font-weight:800;
  letter-spacing:-2px;color:var(--cyan);
  text-align:center;margin-bottom:5px;
  text-shadow:0 0 40px rgba(0,255,224,0.28);
}
.atag{
  font-size:10px;color:var(--muted);text-align:center;
  letter-spacing:3px;text-transform:uppercase;margin-bottom:30px;
}
.tabs{
  display:flex;border:1px solid var(--line2);border-radius:10px;
  overflow:hidden;margin-bottom:26px;
}
.tbtn{
  flex:1;padding:10px;border:none;background:transparent;
  color:var(--muted);font-family:var(--fm);font-size:13px;cursor:pointer;
  transition:all .25s;
}
.tbtn:first-child{border-right:1px solid var(--line2)}
.tbtn.on{background:var(--ink3);color:var(--cyan)}
.fi{
  width:100%;padding:12px 13px;margin-bottom:11px;
  background:var(--ink3);border:1px solid var(--line);
  border-radius:10px;color:var(--text);
  font-family:var(--fm);font-size:14px;outline:none;
  transition:all .25s;-webkit-appearance:none;
}
.fi:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,255,224,0.08)}
.fi::placeholder{color:var(--muted2)}
.asub{
  width:100%;padding:13px;margin-top:4px;
  background:var(--cyan);border:none;border-radius:10px;
  color:var(--ink);font-family:var(--fu);font-weight:700;
  font-size:15px;cursor:pointer;transition:all .25s;letter-spacing:.3px;
}
.asub:hover{background:var(--cyan2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,255,224,0.22)}
.asub:active{transform:translateY(1px)}
.amsg{margin-top:11px;text-align:center;font-size:12px;min-height:17px}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* APP */
.app{
  display:flex;height:100vh;height:-webkit-fill-available;
  opacity:0;transition:opacity .5s;
}
.app.on{opacity:1}

/* SIDEBAR */
.sidebar{
  width:275px;background:var(--ink2);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:10;
}
.sbtop{
  padding:14px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:11px;
}
.uava{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,var(--cyan),var(--mag));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fu);font-weight:800;font-size:17px;color:var(--ink);flex-shrink:0;
}
.unm{font-family:var(--fu);font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.usb{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.newbtn{
  margin:8px;width:calc(100% - 16px);
  padding:11px;background:transparent;
  border:1px dashed rgba(0,255,224,0.28);
  border-radius:var(--r);color:var(--cyan);
  font-family:var(--fm);font-size:13px;cursor:pointer;
  transition:all .25s;letter-spacing:.3px;
}
.newbtn:hover{background:rgba(0,255,224,0.06);border-color:var(--cyan)}
.sbbody{flex:1;overflow-y:auto;padding:6px;position:relative}
.sbbody::-webkit-scrollbar{width:3px}
.sbbody::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
.slider{
  position:absolute;left:6px;right:6px;
  background:var(--ink3);border:1px solid rgba(0,255,224,0.18);
  border-left:2px solid var(--cyan);border-radius:var(--r);
  pointer-events:none;z-index:0;display:none;
  transition:top .32s cubic-bezier(.4,0,.2,1),height .32s cubic-bezier(.4,0,.2,1);
}
.ci{
  padding:11px 12px;border-radius:var(--r);cursor:pointer;
  margin-bottom:2px;position:relative;z-index:1;transition:all .2s;
}
.ci:hover{background:rgba(255,255,255,0.03)}
.cinm{
  font-family:var(--fu);font-weight:600;font-size:13px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s;
}
.ci:hover .cinm,.ci.act .cinm{color:var(--cyan)}
.cipv{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.sbempty{text-align:center;color:var(--muted);padding:40px 12px;font-size:12px;line-height:2}

/* MAIN CHAT */
.chat{
  flex:1;display:flex;flex-direction:column;
  background:var(--ink);min-width:0;position:relative;
}
.chat::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.012) 40px);
  z-index:0;
}
.chtop{
  padding:13px 15px;
  background:rgba(13,13,15,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:11px;
  z-index:1;flex-shrink:0;
}
.backbtn{
  display:none;width:36px;height:36px;
  border:1px solid var(--line2);border-radius:9px;
  background:transparent;color:var(--text);
  font-size:17px;cursor:pointer;
  align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.backbtn:hover{background:var(--ink3);border-color:var(--cyan);color:var(--cyan)}
.chava{
  width:36px;height:36px;border-radius:9px;
  background:var(--ink3);border:1px solid var(--line2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fu);font-weight:800;font-size:15px;color:var(--cyan);flex-shrink:0;
}
.chnm{font-family:var(--fu);font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chst{font-size:10px;color:var(--cyan);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}

#msgs{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:8px;
  scroll-behavior:smooth;position:relative;z-index:1;
  transition:opacity .25s,transform .25s;
}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

.msg{max-width:74%;word-break:break-word;animation:mgin .35s cubic-bezier(.4,0,.2,1)}
@keyframes mgin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.own{align-self:flex-end}
.msg.oth{align-self:flex-start}
.msg-who{font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;padding:0 3px}
.msg.own .msg-who{color:var(--cyan);text-align:right}
.msg.oth .msg-who{color:var(--muted)}
.msg-bub{
  padding:10px 13px;border-radius:var(--r);font-size:13.5px;line-height:1.6;
}
.msg.own .msg-bub{
  background:rgba(0,255,224,0.08);
  border:1px solid rgba(0,255,224,0.18);
  border-bottom-right-radius:3px;
}
.msg.oth .msg-bub{
  background:var(--ink2);border:1px solid var(--line2);
  border-bottom-left-radius:3px;
}
.msg-t{font-size:10px;color:var(--muted2);margin-top:3px;padding:0 3px}
.msg.own .msg-t{text-align:right}

.emsg{margin:auto;text-align:center;color:var(--muted)}
.emsg-ico{font-size:38px;margin-bottom:10px;opacity:.35}
.emsg p{font-size:12px;line-height:2;letter-spacing:.3px}

/* INPUT */
.inrow{
  padding:12px 13px;
  background:rgba(13,13,15,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
  display:flex;gap:9px;align-items:center;
  z-index:1;flex-shrink:0;
}
#mi{
  flex:1;padding:11px 13px;
  background:var(--ink2);border:1px solid var(--line2);
  border-radius:10px;color:var(--text);
  font-family:var(--fm);font-size:14px;outline:none;
  transition:all .25s;-webkit-appearance:none;min-width:0;
}
#mi:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,255,224,0.07)}
#mi::placeholder{color:var(--muted2)}
#mi:disabled{opacity:.4}
#sbtn{
  width:42px;height:42px;flex-shrink:0;
  background:var(--cyan);border:none;border-radius:10px;
  color:var(--ink);font-size:18px;cursor:pointer;
  transition:all .25s;display:flex;align-items:center;justify-content:center;
}
#sbtn:hover{background:var(--cyan2);transform:scale(1.05)}
#sbtn:active{transform:scale(.95)}
#sbtn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* MODAL */
.modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:500;align-items:center;justify-content:center;padding:20px;
}
.modal.on{display:flex}
.mbox{
  background:var(--ink2);border:1px solid var(--line2);
  border-radius:var(--r2);padding:24px;width:100%;max-width:360px;
  animation:mbox .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 40px 80px rgba(0,0,0,0.55);
}
@keyframes mbox{from{opacity:0;transform:scale(.87) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mtitle{font-family:var(--fu);font-weight:700;font-size:17px;margin-bottom:16px}
.minput{
  width:100%;padding:12px 13px;margin-bottom:12px;
  background:var(--ink3);border:1px solid var(--line2);
  border-radius:10px;color:var(--text);font-family:var(--fm);
  font-size:14px;outline:none;transition:border-color .25s;-webkit-appearance:none;
}
.minput:focus{border-color:var(--cyan)}
.minput::placeholder{color:var(--muted2)}
.mhint{font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.7;padding:0 1px}
.mbtns{display:flex;gap:9px}
.mbtns button{
  flex:1;padding:12px;border:none;border-radius:10px;
  font-family:var(--fu);font-weight:600;font-size:14px;
  cursor:pointer;transition:all .25s;
}
.mok{background:var(--cyan);color:var(--ink)}
.mok:hover{background:var(--cyan2)}
.mcancel{background:var(--ink3);color:var(--muted);border:1px solid var(--line2)}
.mcancel:hover{color:var(--text)}

/* MOBILE OVERLAY */
.movl{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9}

@media(max-width:680px){
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;
    width:275px;max-width:82vw;
    transform:translateX(-100%);z-index:20;
  }
  .sidebar.mopen{transform:translateX(0)}
  .movl.on{display:block}
  .backbtn{display:flex}
  .chat{width:100%}
  .msg{max-width:86%}
}
</style>
</head>
<body>
<canvas id="pc"></canvas>

<!-- AUTH -->
<div id="authBg">
  <div class="alines"></div>
  <div class="aorb"></div>
  <div class="aorb"></div>
  <div class="acard" id="acard">
    <div class="cshine" id="cshine"></div>
    <div class="alogo">SKIP</div>
    <div class="atag">end-to-end encrypted</div>
    <div class="tabs">
      <button class="tbtn on" onclick="setTab('l')">вход</button>
      <button class="tbtn" onclick="setTab('r')">регистрация</button>
    </div>
    <div id="fL">
      <input class="fi" id="lU" type="text" placeholder="никнейм" autocomplete="off" spellcheck="false">
      <input class="fi" id="lP" type="password" placeholder="пароль">
      <button class="asub" onclick="doLogin()">войти →</button>
      <div class="amsg" id="lM" style="color:#ff2d78"></div>
    </div>
    <div id="fR" style="display:none">
      <input class="fi" id="rU" type="text" placeholder="никнейм" autocomplete="off" spellcheck="false">
      <input class="fi" id="rP" type="password" placeholder="пароль">
      <input class="fi" id="rC" type="password" placeholder="повторите пароль">
      <button class="asub" onclick="doReg()">создать аккаунт →</button>
      <div class="amsg" id="rM" style="color:#ff2d78"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="movl" id="movl" onclick="closeSB()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sbtop">
      <div class="uava" id="uava">?</div>
      <div style="flex:1;min-width:0">
        <div class="unm" id="unm">—</div>
        <div class="usb">SKIP</div>
      </div>
    </div>
    <button class="newbtn" onclick="openNC()">+ новый чат</button>
    <div class="sbbody" id="sbbody">
      <div class="slider" id="slider"></div>
      <div class="sbempty" id="sbempty">нет чатов<br>создайте первый</div>
    </div>
  </div>
  <div class="chat">
    <div class="chtop">
      <button class="backbtn" onclick="openSB()">☰</button>
      <div class="chava" id="chava">#</div>
      <div style="flex:1;min-width:0">
        <div class="chnm" id="chnm">выберите чат</div>
        <div class="chst" id="chst">skip · encrypted</div>
      </div>
    </div>
    <div id="msgs">
      <div class="emsg">
        <div class="emsg-ico">💬</div>
        <p>выберите чат<br>чтобы начать</p>
      </div>
    </div>
    <div class="inrow">
      <input id="mi" placeholder="сообщение..." disabled autocomplete="off" spellcheck="false">
      <button id="sbtn" onclick="sendMsg()" disabled>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="mbox">
    <div class="mtitle">новый чат</div>
    <input class="minput" id="mS" placeholder="сид чата" autocomplete="off" spellcheck="false">
    <div class="mhint">сид — общий ключ шифрования. оба участника должны ввести одинаковый сид чтобы видеть сообщения.</div>
    <div class="mbtns">
      <button class="mok" onclick="createChat()">открыть</button>
      <button class="mcancel" onclick="closeModal()">отмена</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const GT='ghp_5GhNw2IFw'+'SNBiCarLnNWF6'+'zMHi4hNW4LgR4N';
const GIST='3c13a9018358fc6dd01e0ec2df85f740';
const UGIST='d0ff1e8a01417e7931279eb563198dba';

// ── PARTICLES ──
const cnv=document.getElementById('pc'),cx=cnv.getContext('2d');
function rsz(){cnv.width=innerWidth;cnv.height=innerHeight}rsz();
window.addEventListener('resize',rsz);
let mx=0,my=0,lx=0,ly=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
document.addEventListener('touchmove',e=>{mx=e.touches[0].clientX;my=e.touches[0].clientY},{passive:true});
const PP=[];
class Par{
  constructor(x,y,vx,vy){
    this.x=x;this.y=y;
    this.vx=vx+(Math.random()-.5)*2;
    this.vy=vy+(Math.random()-.5)*2;
    this.s=Math.random()*4+1.5;
    this.r=Math.random()*Math.PI*2;
    this.rs=(Math.random()-.5)*.14;
    this.life=1;this.d=Math.random()*.02+.013;
    this.c=Math.random()<.65?'0,255,224':'255,45,120';
  }
  tick(){this.x+=this.vx;this.y+=this.vy;this.vy+=.03;this.vx*=.98;this.r+=this.rs;this.life-=this.d}
  draw(){
    if(this.life<=0)return;
    const a=this.life*.75,s=this.s;
    cx.save();cx.translate(this.x,this.y);cx.rotate(this.r);
    cx.globalAlpha=a;cx.fillStyle=`rgba(${this.c},${a})`;cx.strokeStyle=`rgba(${this.c},${a})`;cx.lineWidth=.4;
    cx.fillRect(-s/2,-s/2,s,s);cx.strokeRect(-s/2,-s/2,s,s);cx.restore();
  }
}
let fc=0;
(function loop(){
  requestAnimationFrame(loop);cx.clearRect(0,0,cnv.width,cnv.height);
  const dx=mx-lx,dy=my-ly,spd=Math.sqrt(dx*dx+dy*dy);fc++;
  if(spd>1.5&&fc%2===0){const n=Math.min(Math.floor(spd/5)+1,4);for(let i=0;i<n;i++)PP.push(new Par(mx+(Math.random()-.5)*8,my+(Math.random()-.5)*8,dx*.08,dy*.08-1))}
  lx+=(mx-lx)*.25;ly+=(my-ly)*.25;
  for(let i=PP.length-1;i>=0;i--){PP[i].tick();PP[i].draw();if(PP[i].life<=0)PP.splice(i,1)}
})();

// ── CARD TILT ──
const card=document.getElementById('acard'),shine=document.getElementById('cshine');
document.getElementById('authBg').addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  const tx=Math.max(-10,Math.min(10,((e.clientX-(r.left+r.width/2))/r.width)*20));
  const ty=Math.max(-10,Math.min(10,(-(e.clientY-(r.top+r.height/2))/r.height)*20));
  const sc=1+Math.min(.025,(Math.sqrt(Math.pow(e.clientX-(r.left+r.width/2),2)+Math.pow(e.clientY-(r.top+r.height/2),2))/(r.width*2))*.025);
  card.style.transform=`perspective(1100px) rotateY(${tx}deg) rotateX(${ty}deg) scale(${sc})`;
  shine.style.background=`radial-gradient(circle at ${((e.clientX-r.left)/r.width)*100}% ${((e.clientY-r.top)/r.height)*100}%,rgba(0,255,224,0.1) 0%,transparent 60%)`;
});
document.getElementById('authBg').addEventListener('mouseleave',()=>{
  card.style.transform='perspective(1100px) rotateY(0) rotateX(0) scale(1)';
  shine.style.background='radial-gradient(circle at 50% 50%,rgba(0,255,224,0.05) 0%,transparent 60%)';
});

// ── TAB ──
function setTab(t){
  const l=t==='l';
  document.getElementById('fL').style.display=l?'block':'none';
  document.getElementById('fR').style.display=l?'none':'block';
  document.querySelectorAll('.tbtn').forEach((b,i)=>b.classList.toggle('on',l?i===0:i===1));
}

// ── STATE ──
let ME='',SEED='',TICK=null,HASH='',MSGS=[],CHATS=[],UDATA={};

// ── GITHUB API ──
async function gGet(id){
  const r=await fetch(`https://api.github.com/gists/${id}?t=${Date.now()}`,{
    headers:{Authorization:`token ${GT}`,Accept:'application/vnd.github.v3+json'}
  });
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  return r.json();
}
async function gPatch(id,files){
  const r=await fetch(`https://api.github.com/gists/${id}`,{
    method:'PATCH',
    headers:{Authorization:`token ${GT}`,'Content-Type':'application/json'},
    body:JSON.stringify({files})
  });
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── USERS ──
function hp(p){return CryptoJS.SHA256(p).toString()}
async function getUsers(){
  try{
    const d=await gGet(UGIST);
    const f=d.files['users.json'];
    if(!f||!f.content)return[];
    return JSON.parse(f.content);
  }catch{return[]}
}
async function putUsers(u){
  await gPatch(UGIST,{'users.json':{content:JSON.stringify(u,null,2)}});
}

// ── REGISTER ──
async function doReg(){
  const u=g('rU').value.trim(),p=g('rP').value.trim(),c=g('rC').value.trim();
  const el=g('rM');
  if(!u||!p||!c){sm(el,'❌ заполните все поля');return}
  if(p!==c){sm(el,'❌ пароли не совпадают');return}
  if(p.length<3){sm(el,'❌ пароль минимум 3 символа');return}
  sm(el,'⏳ регистрация...','#606070');
  const us=await getUsers();
  if(us.some(x=>x.username===u)){sm(el,'❌ пользователь уже существует');return}
  us.push({username:u,password:hp(p),chats:[],created:Date.now()});
  await putUsers(us);
  sm(el,'✅ готово! войдите в аккаунт','#00ffe0');
  setTimeout(()=>{setTab('l');el.textContent=''},2000);
}

// ── LOGIN ──
async function doLogin(){
  const u=g('lU').value.trim(),p=g('lP').value.trim();
  const el=g('lM');
  if(!u||!p){sm(el,'❌ введите ник и пароль');return}
  sm(el,'⏳ вход...','#606070');
  const us=await getUsers();
  const usr=us.find(x=>x.username===u&&x.password===hp(p));
  if(!usr){
    sm(el,'❌ неверный ник или пароль');
    card.style.animation='none';void card.offsetWidth;card.style.animation='shake .4s ease';
    return;
  }
  ME=u;UDATA=usr;CHATS=usr.chats||[];
  const bg=g('authBg');bg.style.opacity='0';bg.style.transform='scale(1.04)';
  setTimeout(()=>{
    bg.style.display='none';
    const ap=g('app');ap.classList.add('on');
    g('uava').textContent=u[0].toUpperCase();g('unm').textContent=u;
    renderChats();
    if(CHATS.length)switchChat(CHATS[0].seed);
  },650);
}

// ── CHAT FILE NAME (отдельный файл для каждого seed) ──
function cf(seed){
  return 'chat_'+CryptoJS.SHA256(seed).toString().slice(0,16)+'.txt';
}

// ── RENDER CHATS ──
function renderChats(){
  const body=g('sbbody');
  body.querySelectorAll('.ci').forEach(e=>e.remove());
  const emp=g('sbempty');
  if(!CHATS.length){emp.style.display='block';g('slider').style.display='none';return}
  emp.style.display='none';
  CHATS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='ci';d.id='ci'+i;
    d.innerHTML=`<div class="cinm">${esc(c.name||c.seed)}</div><div class="cipv">${esc(c.prev||'нет сообщений')}</div>`;
    d.onclick=()=>switchChat(c.seed);
    body.appendChild(d);
  });
  setTimeout(moveSlider,30);
}

function moveSlider(){
  const sl=g('slider'),idx=CHATS.findIndex(c=>c.seed===SEED);
  if(idx<0){sl.style.display='none';return}
  const it=g('ci'+idx);if(!it){sl.style.display='none';return}
  const br=g('sbbody').getBoundingClientRect(),ir=it.getBoundingClientRect();
  sl.style.display='block';
  sl.style.top=(ir.top-br.top+g('sbbody').scrollTop)+'px';
  sl.style.height=ir.height+'px';
}

// ── SWITCH CHAT ──
async function switchChat(seed){
  if(SEED===seed)return;
  SEED=seed;MSGS=[];HASH='';
  const ch=CHATS.find(c=>c.seed===seed)||{name:seed};
  g('chava').textContent=(ch.name||seed)[0].toUpperCase();
  g('chnm').textContent=ch.name||seed;
  g('chst').textContent='🔒 зашифровано · skip';
  moveSlider();
  const m=g('msgs');
  m.style.opacity='0';m.style.transform='translateY(6px)';
  setTimeout(()=>{m.innerHTML='';m.style.opacity='1';m.style.transform='translateY(0)'},150);
  g('mi').disabled=false;g('sbtn').disabled=false;
  closeSB();
  await pullMsgs(true);
  if(TICK)clearInterval(TICK);
  TICK=setInterval(()=>pullMsgs(false),3000);
}

// ── PULL MESSAGES ──
async function pullMsgs(force=false){
  if(!SEED)return;
  const fname=cf(SEED);
  try{
    const data=await gGet(GIST);
    const file=data.files[fname];
    const content=file?.content||'';
    const h=CryptoJS.SHA256(content).toString();
    if(!force&&h===HASH)return;
    HASH=h;
    const lines=content.split('\n').filter(l=>l.trim());
    const fresh=[];
    for(const line of lines){
      try{
        const dec=CryptoJS.AES.decrypt(line,SEED).toString(CryptoJS.enc.Utf8);
        if(dec&&dec.length>2&&!MSGS.includes(dec)){MSGS.push(dec);fresh.push(dec)}
      }catch{}
    }
    const m=g('msgs');
    if(force){
      m.innerHTML='';
      if(!MSGS.length){
        m.innerHTML='<div class="emsg"><div class="emsg-ico">💬</div><p>пока нет сообщений</p></div>';
        return;
      }
      MSGS.forEach(s=>showMsg(s));
    }else{
      if(!fresh.length)return;
      fresh.forEach(s=>showMsg(s));
    }
    m.scrollTop=m.scrollHeight;
  }catch(e){console.error('pull:',e)}
}

// ── SHOW MESSAGE ──
function showMsg(raw){
  const m=g('msgs');
  m.querySelectorAll('.emsg').forEach(e=>e.remove());
  const col=raw.indexOf(':');
  const sender=col>0?raw.slice(0,col).trim():'';
  const text=col>0?raw.slice(col+1).trim():raw;
  const own=sender===ME;
  const now=new Date();
  const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const d=document.createElement('div');
  d.className='msg '+(own?'own':'oth');
  d.innerHTML=`<div class="msg-who">${esc(sender||'?')}</div><div class="msg-bub">${esc(text)}</div><div class="msg-t">${t}</div>`;
  m.appendChild(d);
}

// ── SEND MESSAGE ──
async function sendMsg(){
  if(!SEED)return;
  const inp=g('mi'),text=inp.value.trim();
  if(!text)return;
  const full=`${ME}: ${text}`;
  const enc=CryptoJS.AES.encrypt(full,SEED).toString();
  const fname=cf(SEED);
  inp.value='';inp.focus();
  // Показываем сразу
  if(!MSGS.includes(full)){MSGS.push(full);showMsg(full);g('msgs').scrollTop=9999}
  try{
    // Читаем текущий файл чата
    const data=await gGet(GIST);
    const existing=data.files[fname]?.content||'';
    const updated=existing+(existing?'\n':'')+enc;
    // Пишем обратно
    await gPatch(GIST,{[fname]:{content:updated}});
    // Обновляем preview в сайдбаре
    setPrev(SEED,full);
    HASH='';
  }catch(e){
    console.error('send:',e);
    g('chst').textContent='⚠ ошибка — попробуйте ещё раз';
    setTimeout(()=>g('chst').textContent='🔒 зашифровано · skip',3000);
  }
}

// ── UPDATE PREVIEW ──
function setPrev(seed,text){
  const ch=CHATS.find(c=>c.seed===seed);
  if(!ch)return;
  ch.prev=text.length>42?text.slice(0,42)+'…':text;
  renderChats();setTimeout(moveSlider,30);
  // async save to gist (best-effort)
  (async()=>{
    try{
      const us=await getUsers();
      const i=us.findIndex(u=>u.username===ME);
      if(i>=0){us[i].chats=CHATS;await putUsers(us)}
    }catch{}
  })();
}

// ── NEW CHAT ──
function openNC(){
  g('modal').classList.add('on');
  g('mS').value='';
  setTimeout(()=>g('mS').focus(),100);
}
function closeModal(){g('modal').classList.remove('on')}
async function createChat(){
  const seed=g('mS').value.trim();
  if(!seed)return;
  if(CHATS.some(c=>c.seed===seed)){closeModal();switchChat(seed);return}
  CHATS.push({seed,name:seed,prev:'новый чат'});
  try{
    const us=await getUsers();
    const i=us.findIndex(u=>u.username===ME);
    if(i>=0){us[i].chats=CHATS;await putUsers(us)}
  }catch{}
  renderChats();switchChat(seed);closeModal();
}

// ── MOBILE ──
function openSB(){g('sidebar').classList.add('mopen');g('movl').classList.add('on')}
function closeSB(){g('sidebar').classList.remove('mopen');g('movl').classList.remove('on')}

// ── UTILS ──
function g(id){return document.getElementById(id)}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function sm(el,t,c='#ff2d78'){el.style.color=c;el.textContent=t}

// ── KEYBOARD ──
g('mi').addEventListener('keypress',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}});
g('mS').addEventListener('keypress',e=>{if(e.key==='Enter')createChat()});
g('lP').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin()});
g('lU').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin()});
g('sbbody').addEventListener('scroll',moveSlider);
</script>
