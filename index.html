<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SKIP · private chat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#00a8ff;
  --primary-dark:#0097ea;
  --bg-dark:#0a0a1a;
  --bg-surface:#1a1a2e;
  --bg-sidebar:#12121f;
  --text:#ffffff;
  --text-secondary:#888888;
  --border:rgba(0,168,255,0.2);
  --hover:rgba(0,168,255,0.1);
  --active:rgba(0,168,255,0.2);
  --own-msg:rgba(0,168,255,0.1);
  --other-msg:rgba(26,26,46,0.8);
  --error:#ff4444;
  --success:#44ff88;
}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:var(--bg-dark);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}

/* ===== ЧАСТИЦЫ ===== */
#particleCanvas{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:9999;
}

/* ===== ЭКРАН АВТОРИЗАЦИИ ===== */
#authBg{
  position:fixed;inset:0;
  background:var(--bg-dark);
  z-index:1000;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  perspective:1200px;
  transition:opacity 0.6s,transform 0.6s;
}
.auth-bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(0,168,255,0.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,168,255,0.06) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridMove 20s linear infinite;
}
@keyframes gridMove{from{background-position:0 0}to{background-position:60px 60px}}

.auth-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.15;
  animation:orbFloat 8s ease-in-out infinite;
  pointer-events:none;
}
.auth-orb:nth-child(2){width:400px;height:400px;background:#00a8ff;top:-100px;left:-100px;animation-delay:0s}
.auth-orb:nth-child(3){width:300px;height:300px;background:#7b2fff;bottom:-80px;right:-80px;animation-delay:-4s}
.auth-orb:nth-child(4){width:200px;height:200px;background:#00ffcc;top:50%;left:60%;animation-delay:-2s}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,30px)}}

/* ===== КАРТОЧКА ЛОГИНА ===== */
.auth-card{
  position:relative;
  width:100%;max-width:420px;
  background:rgba(26,26,46,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:24px;
  padding:40px;
  border:1px solid rgba(0,168,255,0.25);
  box-shadow:0 0 60px rgba(0,168,255,0.08),0 20px 60px rgba(0,0,0,0.5);
  transform-style:preserve-3d;
  transition:transform 0.12s ease-out;
  will-change:transform;
}
.auth-card-shine{
  position:absolute;inset:0;
  border-radius:24px;
  background:radial-gradient(circle at 50% 50%,rgba(0,168,255,0.08) 0%,transparent 70%);
  pointer-events:none;
  transition:background 0.15s ease-out;
}
.skip-logo{
  font-size:52px;font-weight:700;letter-spacing:-2px;
  text-align:center;margin-bottom:8px;
  background:linear-gradient(135deg,var(--primary) 0%,#ffffff 60%,var(--primary) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logoShimmer 3s ease-in-out infinite;
  background-size:200% 100%;
}
@keyframes logoShimmer{0%,100%{background-position:100% 0}50%{background-position:0 0}}

.auth-subtitle{
  text-align:center;color:var(--text-secondary);
  font-size:13px;margin-bottom:32px;
  letter-spacing:2px;text-transform:uppercase;
}
.tab-row{
  display:flex;gap:8px;margin-bottom:28px;
  background:rgba(0,0,0,0.3);border-radius:12px;padding:4px;
}
.tab-btn{
  flex:1;padding:10px;border:none;border-radius:9px;
  cursor:pointer;font-size:14px;font-weight:500;
  transition:all 0.3s;background:transparent;color:var(--text-secondary);
}
.tab-btn.active{
  background:var(--primary);color:white;
  box-shadow:0 4px 15px rgba(0,168,255,0.3);
}
.auth-input{
  width:100%;padding:13px 16px;margin-bottom:14px;
  background:rgba(0,0,0,0.4);border:1px solid rgba(0,168,255,0.2);
  border-radius:12px;color:var(--text);font-size:15px;outline:none;
  transition:all 0.3s;
}
.auth-input:focus{
  border-color:var(--primary);
  background:rgba(0,168,255,0.05);
  box-shadow:0 0 0 3px rgba(0,168,255,0.1);
}
.auth-btn{
  width:100%;padding:14px;margin-top:6px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border:none;border-radius:12px;color:white;
  font-weight:600;font-size:16px;cursor:pointer;
  transition:all 0.3s;
  box-shadow:0 4px 20px rgba(0,168,255,0.3);
}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,168,255,0.5)}
.auth-btn:active{transform:translateY(0)}
.auth-msg{
  margin-top:14px;text-align:center;
  font-size:13px;min-height:20px;transition:all 0.3s;
}
@keyframes shake{
  0%,100%{transform:perspective(1200px) translateX(0)}
  20%{transform:perspective(1200px) translateX(-8px)}
  40%{transform:perspective(1200px) translateX(8px)}
  60%{transform:perspective(1200px) translateX(-5px)}
  80%{transform:perspective(1200px) translateX(5px)}
}

/* ===== ОСНОВНОЕ ПРИЛОЖЕНИЕ ===== */
.app{
  display:flex;height:100vh;
  max-width:1400px;margin:0 auto;
  opacity:0;transition:opacity 0.5s;
}
.app.visible{opacity:1}

/* ===== САЙДБАР ===== */
.sidebar{
  width:300px;background:var(--bg-sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-header{
  padding:18px;border-bottom:1px solid var(--border);
  background:var(--bg-surface);
}
.user-info-sidebar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.avatar-sidebar{
  width:44px;height:44px;background:var(--primary);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:bold;
  box-shadow:0 0 15px rgba(0,168,255,0.4);
}
.user-name{font-weight:600;font-size:15px}
.new-chat-btn{
  width:100%;padding:11px;background:var(--primary);
  border:none;border-radius:12px;color:white;
  font-weight:600;cursor:pointer;transition:all 0.3s;font-size:14px;
}
.new-chat-btn:hover{
  background:var(--primary-dark);
  transform:translateY(-1px);
  box-shadow:0 4px 15px rgba(0,168,255,0.3);
}
.chats-list{flex:1;overflow-y:auto;padding:8px;position:relative}

/* Скользящий индикатор выбора */
.chat-selector{
  position:absolute;left:8px;right:8px;
  background:var(--active);
  border-left:3px solid var(--primary);
  border-radius:12px;
  transition:top 0.35s cubic-bezier(0.4,0,0.2,1),height 0.35s cubic-bezier(0.4,0,0.2,1);
  pointer-events:none;z-index:0;
  display:none;
}
.chat-item{
  padding:12px;border-radius:12px;
  cursor:pointer;margin-bottom:4px;
  position:relative;z-index:1;
  transition:color 0.3s;
}
.chat-item:hover .chat-name{color:var(--primary)}
.chat-name{font-weight:500;font-size:14px;transition:color 0.3s}
.chat-preview{
  font-size:12px;color:var(--text-secondary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;
}

/* ===== ОСНОВНОЙ ЧАТ ===== */
.main-chat{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg-surface);overflow:hidden;
}
.chat-header{
  padding:18px 24px;background:rgba(0,0,0,0.3);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.chat-header-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),#7b2fff);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  flex-shrink:0;
}
.current-chat-name{font-size:17px;font-weight:600}
.chat-status{font-size:12px;color:var(--primary);margin-top:1px}

#messages{
  flex:1;overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
  transition:opacity 0.3s,transform 0.3s;
}
.msg-item{
  padding:11px 15px;border-radius:18px;
  max-width:70%;word-wrap:break-word;
  animation:msgFadeIn 0.4s cubic-bezier(0.4,0,0.2,1);
}
.msg-item.own{
  background:var(--own-msg);
  border-left:3px solid var(--success);
  align-self:flex-end;
}
.msg-item.other{
  background:var(--other-msg);
  border-left:3px solid var(--primary);
  align-self:flex-start;
}
@keyframes msgFadeIn{
  from{opacity:0;transform:translateY(12px) scale(0.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.empty-chat{
  text-align:center;color:var(--text-secondary);
  padding:40px;margin:auto;
}
.empty-chat-icon{font-size:48px;margin-bottom:12px;opacity:0.5}

/* ===== ВВОД ===== */
.input-area{
  padding:16px 20px;background:rgba(0,0,0,0.3);
  border-top:1px solid var(--border);display:flex;gap:10px;
}
.input-area input{
  flex:1;padding:11px 16px;background:rgba(0,0,0,0.3);
  border:1px solid var(--border);border-radius:22px;
  color:var(--text);font-size:15px;outline:none;transition:all 0.3s;
}
.input-area input:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(0,168,255,0.1);
}
.send-btn{
  padding:11px 22px;background:var(--primary);
  border:none;border-radius:22px;color:white;
  font-weight:600;cursor:pointer;transition:all 0.3s;font-size:16px;
}
.send-btn:hover{background:var(--primary-dark);transform:scale(1.05)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

/* ===== МОДАЛКА ===== */
.modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.75);z-index:500;
  justify-content:center;align-items:center;
}
.modal.active{display:flex}
.modal-content{
  background:var(--bg-surface);border-radius:20px;
  padding:24px;width:90%;max-width:380px;
  border:1px solid var(--border);
  animation:modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalIn{
  from{opacity:0;transform:scale(0.85) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.modal-content h3{margin-bottom:18px;font-size:17px}
.modal-content input{
  width:100%;padding:12px;margin-bottom:18px;
  background:rgba(0,0,0,0.3);border:1px solid var(--border);
  border-radius:12px;color:var(--text);font-size:15px;outline:none;
  transition:border-color 0.3s;
}
.modal-content input:focus{border-color:var(--primary)}
.modal-buttons{display:flex;gap:10px}
.modal-buttons button{
  flex:1;padding:12px;border:none;
  border-radius:12px;cursor:pointer;
  font-size:14px;font-weight:500;transition:all 0.3s;
}
.modal-buttons button:first-child{background:var(--primary);color:white}
.modal-buttons button:last-child{background:rgba(255,255,255,0.1);color:var(--text)}
.modal-buttons button:hover{filter:brightness(1.2)}

/* ===== СКРОЛЛ ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,168,255,0.3);border-radius:2px}
</style>
</head>
<body>

<!-- CANVAS ДЛЯ ЧАСТИЦ -->
<canvas id="particleCanvas"></canvas>

<!-- ЭКРАН АВТОРИЗАЦИИ -->
<div id="authBg">
  <div class="auth-bg-grid"></div>
  <div class="auth-orb"></div>
  <div class="auth-orb"></div>
  <div class="auth-orb"></div>

  <div class="auth-card" id="authCard">
    <div class="auth-card-shine" id="cardShine"></div>
    <div class="skip-logo">SKIP</div>
    <div class="auth-subtitle">private encrypted chat</div>

    <div class="tab-row">
      <button class="tab-btn active" id="loginTabBtn" onclick="switchTab('login')">Вход</button>
      <button class="tab-btn" id="registerTabBtn" onclick="switchTab('register')">Регистрация</button>
    </div>

    <div id="loginForm">
      <input type="text" class="auth-input" id="loginUsername" placeholder="Никнейм" autocomplete="off">
      <input type="password" class="auth-input" id="loginPassword" placeholder="Пароль">
      <button class="auth-btn" onclick="login()">Войти</button>
      <div class="auth-msg" id="loginMessage" style="color:var(--error)"></div>
    </div>

    <div id="registerForm" style="display:none">
      <input type="text" class="auth-input" id="registerUsername" placeholder="Никнейм" autocomplete="off">
      <input type="password" class="auth-input" id="registerPassword" placeholder="Пароль">
      <input type="password" class="auth-input" id="registerConfirm" placeholder="Подтвердите пароль">
      <button class="auth-btn" onclick="register()">Зарегистрироваться</button>
      <div class="auth-msg" id="registerMessage" style="color:var(--error)"></div>
    </div>
  </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="user-info-sidebar">
        <div class="avatar-sidebar" id="sidebarAvatar">👤</div>
        <div>
          <div class="user-name" id="sidebarName"></div>
          <div style="font-size:11px;color:var(--text-secondary)">SKIP Chat</div>
        </div>
      </div>
      <button class="new-chat-btn" onclick="showNewChatModal()">+ Новый чат</button>
    </div>
    <div class="chats-list" id="chatsList">
      <div class="chat-selector" id="chatSelector"></div>
      <div id="chatsEmpty" style="text-align:center;color:var(--text-secondary);padding:40px;font-size:14px">
        Нет чатов<br><br>Нажмите «+ Новый чат»
      </div>
    </div>
  </div>

  <div class="main-chat">
    <div class="chat-header">
      <div class="chat-header-avatar" id="chatHeaderAvatar">💬</div>
      <div>
        <div class="current-chat-name" id="currentChatDisplay">Выберите чат</div>
        <div class="chat-status" id="chatStatus">SKIP · encrypted</div>
      </div>
    </div>
    <div id="messages">
      <div class="empty-chat">
        <div class="empty-chat-icon">💬</div>
        Выберите чат чтобы начать
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Сообщение..." disabled>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </div>
</div>

<!-- МОДАЛКА НОВОГО ЧАТА -->
<div id="newChatModal" class="modal">
  <div class="modal-content">
    <h3>🔑 Новый чат</h3>
    <input type="text" id="newChatSeed" placeholder="Введите сид чата" autocomplete="off">
    <div class="modal-buttons">
      <button onclick="createNewChat()">Создать</button>
      <button onclick="closeModal()">Отмена</button>
    </div>
  </div>
</div>

<script>
// ========== КОНФИГУРАЦИЯ ==========
const GITHUB_TOKEN = 'ghp_5GhNw2IFw' + 'SNBiCarLnNWF6' + 'zMHi4hNW4LgR4N';
const GIST_ID = '3c13a9018358fc6dd01e0ec2df85f740';
const USERS_GIST_ID = 'd0ff1e8a01417e7931279eb563198dba';
const FILE_NAME = 'chat.txt';
const USERS_FILE = 'users.json';

// ========== СИСТЕМА ЧАСТИЦ ==========
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let mouseX = 0, mouseY = 0, lastMouseX = 0, lastMouseY = 0;
const particles = [];

class Particle {
  constructor(x, y, vx, vy) {
    this.x = x;
    this.y = y;
    this.vx = vx + (Math.random() - 0.5) * 1.5;
    this.vy = vy + (Math.random() - 0.5) * 1.5;
    this.size = Math.random() * 5 + 2;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.15;
    this.life = 1;
    this.decay = Math.random() * 0.018 + 0.012;
    this.color = Math.random() < 0.6 ? '0,168,255' : '123,47,255';
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.04;
    this.vx *= 0.99;
    this.rotation += this.rotSpeed;
    this.life -= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    const a = this.life * 0.8;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = a;
    ctx.fillStyle = `rgba(${this.color},${a})`;
    ctx.strokeStyle = `rgba(${this.color},0.9)`;
    ctx.lineWidth = 0.5;
    const s = this.size;
    ctx.fillRect(-s / 2, -s / 2, s, s);
    ctx.strokeRect(-s / 2, -s / 2, s, s);
    ctx.restore();
  }
}

let frameCount = 0;
function animateParticles() {
  requestAnimationFrame(animateParticles);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const dx = mouseX - lastMouseX;
  const dy = mouseY - lastMouseY;
  const speed = Math.sqrt(dx * dx + dy * dy);
  frameCount++;

  if (speed > 2 && frameCount % 2 === 0) {
    const count = Math.min(Math.floor(speed / 4) + 1, 5);
    for (let i = 0; i < count; i++) {
      particles.push(new Particle(
        mouseX + (Math.random() - 0.5) * 10,
        mouseY + (Math.random() - 0.5) * 10,
        dx * 0.1 + (Math.random() - 0.5) * 2,
        dy * 0.1 + (Math.random() - 0.5) * 2 - 1
      ));
    }
  }

  lastMouseX += (mouseX - lastMouseX) * 0.3;
  lastMouseY += (mouseY - lastMouseY) * 0.3;

  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
}
animateParticles();

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// ========== 3D TILT КАРТОЧКИ ==========
const authCard = document.getElementById('authCard');
const cardShine = document.getElementById('cardShine');
const authBg = document.getElementById('authBg');

authBg.addEventListener('mousemove', e => {
  const rect = authCard.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  const maxTilt = 10;
  const tx = Math.max(-maxTilt, Math.min(maxTilt, (dx / rect.width) * maxTilt * 2));
  const ty = Math.max(-maxTilt, Math.min(maxTilt, (-dy / rect.height) * maxTilt * 2));
  const dist = Math.sqrt(dx * dx + dy * dy);
  const scale = 1 + Math.min(0.03, (dist / (rect.width * 2)) * 0.03);
  authCard.style.transform = `perspective(1200px) rotateY(${tx}deg) rotateX(${ty}deg) scale(${scale})`;
  const px = ((e.clientX - rect.left) / rect.width) * 100;
  const py = ((e.clientY - rect.top) / rect.height) * 100;
  cardShine.style.background = `radial-gradient(circle at ${px}% ${py}%, rgba(0,168,255,0.12) 0%, transparent 65%)`;
});

authBg.addEventListener('mouseleave', () => {
  authCard.style.transform = 'perspective(1200px) rotateY(0deg) rotateX(0deg) scale(1)';
  cardShine.style.background = 'radial-gradient(circle at 50% 50%, rgba(0,168,255,0.05) 0%, transparent 70%)';
});

// ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
function switchTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('loginTabBtn').className = 'tab-btn' + (tab === 'login' ? ' active' : '');
  document.getElementById('registerTabBtn').className = 'tab-btn' + (tab === 'register' ? ' active' : '');
}

// ========== ПЕРЕМЕННЫЕ ==========
let currentUser = '';
let currentChatSeed = '';
let updateInterval = null;
let lastContentHash = '';
let allMessages = [];
let userChats = [];
let currentUserData = {};

// ========== АВТОРИЗАЦИЯ ==========
function hashPassword(pwd) {
  return CryptoJS.SHA256(pwd).toString();
}

async function loadUsers() {
  try {
    const r = await fetch(`https://api.github.com/gists/${USERS_GIST_ID}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    if (!r.ok) return [];
    const d = await r.json();
    return JSON.parse(d.files[USERS_FILE].content || '[]');
  } catch { return []; }
}

async function saveUsers(users) {
  try {
    const r = await fetch(`https://api.github.com/gists/${USERS_GIST_ID}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ files: { [USERS_FILE]: { content: JSON.stringify(users, null, 2) } } })
    });
    return r.ok;
  } catch { return false; }
}

async function register() {
  const u = document.getElementById('registerUsername').value.trim();
  const p = document.getElementById('registerPassword').value.trim();
  const c = document.getElementById('registerConfirm').value.trim();
  const el = document.getElementById('registerMessage');
  if (!u || !p || !c) { el.textContent = '❌ Заполните все поля'; return; }
  if (p !== c) { el.textContent = '❌ Пароли не совпадают'; return; }
  if (p.length < 3) { el.textContent = '❌ Пароль минимум 3 символа'; return; }
  const users = await loadUsers();
  if (users.some(x => x.username === u)) { el.textContent = '❌ Пользователь уже существует'; return; }
  users.push({ username: u, password: hashPassword(p), chats: [], created: new Date().toISOString() });
  const ok = await saveUsers(users);
  if (ok) {
    el.style.color = 'var(--success)';
    el.textContent = '✅ Регистрация успешна!';
    setTimeout(() => { switchTab('login'); el.textContent = ''; }, 2000);
  }
}

async function login() {
  const u = document.getElementById('loginUsername').value.trim();
  const p = document.getElementById('loginPassword').value.trim();
  const el = document.getElementById('loginMessage');
  if (!u || !p) { el.textContent = '❌ Введите ник и пароль'; return; }
  const users = await loadUsers();
  const user = users.find(x => x.username === u && x.password === hashPassword(p));
  if (user) {
    currentUser = u;
    currentUserData = user;
    userChats = user.chats || [];
    // Анимация ухода экрана авторизации
    authBg.style.opacity = '0';
    authBg.style.transform = 'scale(1.05)';
    setTimeout(() => {
      authBg.style.display = 'none';
      const app = document.getElementById('app');
      app.classList.add('visible');
      document.getElementById('sidebarAvatar').textContent = u.charAt(0).toUpperCase();
      document.getElementById('sidebarName').textContent = u;
      renderChatsList();
      if (userChats.length > 0) switchChat(userChats[0].seed);
    }, 600);
  } else {
    el.textContent = '❌ Неверный ник или пароль';
    authCard.style.animation = 'none';
    void authCard.offsetWidth; // reflow
    authCard.style.animation = 'shake 0.4s ease';
  }
}

// ========== ЧАТЫ ==========
function renderChatsList() {
  const list = document.getElementById('chatsList');
  const empty = document.getElementById('chatsEmpty');

  // Убираем старые chat-item
  list.querySelectorAll('.chat-item').forEach(el => el.remove());

  if (userChats.length === 0) {
    if (empty) empty.style.display = 'block';
    const sel = document.getElementById('chatSelector');
    if (sel) sel.style.display = 'none';
    return;
  }
  if (empty) empty.style.display = 'none';

  userChats.forEach((chat, i) => {
    const div = document.createElement('div');
    div.className = 'chat-item';
    div.id = 'chatItem' + i;
    div.innerHTML = `
      <div class="chat-name">${escapeHtml(chat.name || chat.seed)}</div>
      <div class="chat-preview">${escapeHtml(chat.lastMessage || 'Нет сообщений')}</div>
    `;
    div.onclick = () => switchChat(chat.seed);
    list.appendChild(div);
  });

  setTimeout(updateSelectorPosition, 50);
}

function updateSelectorPosition() {
  const sel = document.getElementById('chatSelector');
  if (!sel) return;
  const idx = userChats.findIndex(c => c.seed === currentChatSeed);
  if (idx === -1) { sel.style.display = 'none'; return; }
  const itemEl = document.getElementById('chatItem' + idx);
  if (!itemEl) { sel.style.display = 'none'; return; }
  const listEl = document.getElementById('chatsList');
  const listRect = listEl.getBoundingClientRect();
  const itemRect = itemEl.getBoundingClientRect();
  sel.style.display = 'block';
  sel.style.top = (itemRect.top - listRect.top + listEl.scrollTop) + 'px';
  sel.style.height = itemRect.height + 'px';
}

function showNewChatModal() {
  document.getElementById('newChatModal').classList.add('active');
  document.getElementById('newChatSeed').value = '';
  setTimeout(() => document.getElementById('newChatSeed').focus(), 100);
}

function closeModal() {
  document.getElementById('newChatModal').classList.remove('active');
}

async function createNewChat() {
  const seed = document.getElementById('newChatSeed').value.trim();
  if (!seed) { alert('Введите сид чата'); return; }
  if (userChats.some(c => c.seed === seed)) { alert('Этот чат уже есть в списке'); closeModal(); return; }
  userChats.push({ seed, name: seed, lastMessage: 'Новый чат', lastSeen: Date.now() });
  await saveUserChats();
  renderChatsList();
  switchChat(seed);
  closeModal();
}

async function switchChat(seed) {
  if (currentChatSeed === seed) return;
  if (currentChatSeed) await saveUserChats();
  currentChatSeed = seed;
  document.getElementById('currentChatDisplay').textContent = seed;
  document.getElementById('chatHeaderAvatar').textContent = seed.charAt(0).toUpperCase();
  document.getElementById('chatStatus').textContent = '🔒 зашифровано · SKIP';
  updateSelectorPosition();
  allMessages = [];
  lastContentHash = '';

  // Анимация смены чата
  const md = document.getElementById('messages');
  md.style.opacity = '0';
  md.style.transform = 'translateY(8px)';
  setTimeout(() => {
    md.innerHTML = '';
    md.style.opacity = '1';
    md.style.transform = 'translateY(0)';
  }, 150);

  document.getElementById('msgInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;

  await loadMessages(true);
  if (updateInterval) clearInterval(updateInterval);
  updateInterval = setInterval(() => loadMessages(false), 3000);
}

async function saveUserChats() {
  const users = await loadUsers();
  const i = users.findIndex(u => u.username === currentUser);
  if (i !== -1) {
    users[i].chats = userChats;
    await saveUsers(users);
    currentUserData = users[i];
  }
}

async function updateLastMessage(seed, message) {
  const chat = userChats.find(c => c.seed === seed);
  if (chat) {
    chat.lastMessage = message.length > 50 ? message.substring(0, 50) + '...' : message;
    chat.lastSeen = Date.now();
    await saveUserChats();
    renderChatsList();
    setTimeout(updateSelectorPosition, 50);
  }
}

// ========== СООБЩЕНИЯ ==========
async function loadMessages(forceReload = false) {
  if (!currentChatSeed) return;
  try {
    const r = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    if (!r.ok) return;
    const data = await r.json();
    const content = data.files[FILE_NAME].content || '';
    const hash = CryptoJS.SHA256(content).toString();
    if (!forceReload && hash === lastContentHash) return;
    const lines = content.split('\n').filter(l => l.trim());
    const md = document.getElementById('messages');
    const newMsgs = [];
    for (let line of lines) {
      try {
        const dec = CryptoJS.AES.decrypt(line, currentChatSeed).toString(CryptoJS.enc.Utf8);
        if (dec && dec.length > 3 && !allMessages.includes(dec)) {
          newMsgs.push(dec);
          allMessages.push(dec);
          if (!dec.startsWith(currentUser + ':')) updateLastMessage(currentChatSeed, dec);
        }
      } catch (e) {}
    }
    if (newMsgs.length > 0 || forceReload) {
      if (forceReload) { md.innerHTML = ''; allMessages.forEach(m => displayMessage(m)); }
      else newMsgs.forEach(m => displayMessage(m));
      md.scrollTop = md.scrollHeight;
    }
    lastContentHash = hash;
    if (md.children.length === 0) {
      md.innerHTML = '<div class="empty-chat"><div class="empty-chat-icon">💬</div>Пока нет сообщений</div>';
    }
  } catch (e) { console.error(e); }
}

function displayMessage(message) {
  const md = document.getElementById('messages');
  md.querySelectorAll('.empty-chat').forEach(e => e.remove());
  const own = message.startsWith(currentUser + ':');
  const div = document.createElement('div');
  div.className = 'msg-item ' + (own ? 'own' : 'other');
  div.textContent = message;
  md.appendChild(div);
}

async function sendMessage() {
  if (!currentChatSeed) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  const full = `${currentUser}: ${text}`;
  const enc = CryptoJS.AES.encrypt(full, currentChatSeed).toString();
  try {
    const gr = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    if (!gr.ok) throw new Error();
    const gd = await gr.json();
    const old = gd.files[FILE_NAME]?.content || '';
    const newc = old + (old ? '\n' : '') + enc;
    const pr = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [FILE_NAME]: { content: newc } } })
    });
    if (pr.ok) {
      input.value = '';
      if (!allMessages.includes(full)) {
        allMessages.push(full);
        displayMessage(full);
        const md = document.getElementById('messages');
        md.scrollTop = md.scrollHeight;
      }
      updateLastMessage(currentChatSeed, full);
      lastContentHash = '';
    } else { alert('Ошибка отправки'); }
  } catch { alert('Ошибка отправки'); }
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// ========== ОБРАБОТЧИКИ ==========
document.getElementById('msgInput').addEventListener('keypress', function (e) {
  if (e.key === 'Enter' && !this.disabled) sendMessage();
});
document.getElementById('newChatSeed').addEventListener('keypress', function (e) {
  if (e.key === 'Enter') createNewChat();
});
document.getElementById('loginPassword').addEventListener('keypress', function (e) {
  if (e.key === 'Enter') login();
});
document.getElementById('loginUsername').addEventListener('keypress', function (e) {
  if (e.key === 'Enter') login();
});
document.getElementById('chatsList').addEventListener('scroll', updateSelectorPosition);
</script>
</body>
